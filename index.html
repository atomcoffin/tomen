<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ===== STATE =====
let library = []; // Metadata only: {id, title, author, cover, progress, chapterIndex, scrollPos}
let currentBook = null; // Full book with chapters when opened
let currentChapterIndex = 0;
let chapters = [];
let toc = [];
let uiVisible = true;
let currentView = localStorage.getItem('tomen_view') || 'spine';
let currentSort = localStorage.getItem('tomen_sort') || 'title';

// ===== INDEXEDDB STORAGE =====
const DB_NAME = 'tomen';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books')) {
        d.createObjectStore('books', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('content')) {
        d.createObjectStore('content', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ===== HELPERS =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function $(id) { return document.getElementById(id); }

// Save just the lightweight book metadata (not chapter content)
async function saveBookMeta(book) {
  const meta = {
    id: book.id, title: book.title, author: book.author, cover: book.cover,
    progress: book.progress || 0, chapterIndex: book.chapterIndex || 0,
    spreadIndex: book.spreadIndex || 0,
    scrollPos: book.scrollPos || 0, chapterCount: (book.chapters || []).length,
    contentSize: (book.chapters || []).reduce((s, c) => s + (c.html?.length || 0), 0),
    spineColor: book.spineColor || null,
    marks: book.marks || []
  };
  await dbPut('books', meta);
}

// Save the heavy book content (chapters + toc)
async function saveBookContent(book) {
  await dbPut('content', { id: book.id, chapters: book.chapters, toc: book.toc });
}

// Save progress for currently-open book (metadata only, no content rewrite)
async function saveLibrary() {
  // Find the book in library array and persist its metadata
  if (currentBook) {
    const idx = library.findIndex(b => b.id === currentBook.id);
    if (idx >= 0) {
      library[idx].progress = currentBook.progress;
      library[idx].chapterIndex = currentBook.chapterIndex;
      library[idx].spreadIndex = currentBook.spreadIndex;
      library[idx].scrollPos = currentBook.scrollPos;
      library[idx].marks = currentBook.marks;
      await saveBookMeta(library[idx]);
    }
  }
}

// Load full book content by ID (on demand when opening)
async function loadBookContent(id) {
  const content = await dbGet('content', id);
  return content || { chapters: [], toc: [] };
}

// Delete a book completely
async function deleteBook(id) {
  await dbDelete('books', id);
  await dbDelete('content', id);
  library = library.filter(b => b.id !== id);
}

// Migrate from old localStorage format
async function migrateFromLocalStorage() {
  const old = localStorage.getItem('tomen_library');
  if (!old) return;
  try {
    const oldLib = JSON.parse(old);
    if (!Array.isArray(oldLib) || oldLib.length === 0) {
      localStorage.removeItem('tomen_library');
      return;
    }
    console.log(`Migrating ${oldLib.length} books from localStorage to IndexedDB…`);
    for (const b of oldLib) {
      await saveBookMeta(b);
      if (b.chapters) await saveBookContent(b);
    }
    localStorage.removeItem('tomen_library');
    console.log('Migration complete.');
  } catch (err) {
    console.error('Migration failed:', err);
  }
}

async function loadLibrary() {
  library = await dbGetAll('books');
}

// Generate a color from a string (fallback for books without covers)
function strColor(str) {
  const colors = [
    ['#C45D3E','#A94E33'], ['#2C4A6E','#1A3350'], ['#3A7D5E','#2A5D44'],
    ['#8B6E5A','#6B5040'], ['#6B4C8A','#4A3466'], ['#B8860B','#8B6508'],
    ['#4A6B8A','#335070'], ['#8A4A5A','#6B3344'], ['#5A7A4A','#3D5A30'],
    ['#7A6B4A','#5A4E30']
  ];
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

// Extract dominant color from a cover image data URL
function extractColor(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 16;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 4) {
        // Skip very light and very dark pixels
        const brightness = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        if (brightness > 30 && brightness < 220) {
          r += data[i]; g += data[i+1]; b += data[i+2]; count++;
        }
      }
      if (count === 0) { resolve(null); return; }
      r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
      // Make it slightly darker for the gradient bottom
      const dr = Math.max(0, r - 30), dg = Math.max(0, g - 30), db = Math.max(0, b - 30);
      resolve([`rgb(${r},${g},${b})`, `rgb(${dr},${dg},${db})`]);
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

// Cache extracted colors
const colorCache = {};
async function getSpineColor(book) {
  if (colorCache[book.id]) return colorCache[book.id];
  if (book.cover) {
    const extracted = await extractColor(book.cover);
    if (extracted) {
      colorCache[book.id] = extracted;
      return extracted;
    }
  }
  const fallback = strColor(book.title);
  colorCache[book.id] = fallback;
  return fallback;
}

// ===== SPINE DIMENSIONS =====
// Each book has a "volume" (from content size) and a "format" (seeded from title/author).
// Format determines how the volume is distributed between height and width.
// Tall/slim books are like paperbacks. Short/thick books are like hardcovers.

function hashBook(book) {
  let h = 0;
  const s = (book.title || '') + '|' + (book.author || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function spineDimensions(book) {
  const total = book.contentSize || (book.chapters || []).reduce((s, c) => s + (c.html?.length || 0), 0);
  const hash = hashBook(book);

  // Volume: log-scaled content size → 0.0 (tiny) to 1.0 (massive)
  const log = Math.log10(Math.max(1000, total));
  const volume = Math.max(0, Math.min(1, (log - 4.0) / 2.5)); // 4.0–6.5 → 0–1

  // Format: hash-seeded ratio of height vs width
  // 0.0 = very tall/slim, 1.0 = very short/thick
  const formatSeed = (hash % 100) / 100; // 0.0 to 0.99

  // Height: 65–98%, influenced by volume (bigger = taller) and format (tall format = taller)
  const tallness = 1.0 - formatSeed; // invert: low seed = tall
  const heightBase = 65 + volume * 20 + tallness * 13;
  const heightPct = Math.max(60, Math.min(98, Math.round(heightBase)));

  // Width: 40–120px, influenced by volume (bigger = wider) and format (thick format = wider)
  const thickness = formatSeed; // high seed = thick
  const widthBase = 40 + volume * 50 + thickness * 30;
  const widthPx = Math.max(40, Math.min(120, Math.round(widthBase)));

  // Apply responsive scale to width
  return { heightPct, widthPx: Math.round(widthPx * spineScale) };
}

// Keep these as wrappers for backward compatibility
function spineWidth(book) { return spineDimensions(book).widthPx; }
function spineHeight(book) { return spineDimensions(book).heightPct; }

// Get the current spine scale from CSS (responsive)
let spineScale = 1;
function updateSpineScale() {
  const test = document.createElement('div');
  test.className = 'spine';
  test.style.cssText = 'position:absolute;visibility:hidden;';
  document.body.appendChild(test);
  const val = getComputedStyle(test).getPropertyValue('--spine-scale');
  document.body.removeChild(test);
  spineScale = parseFloat(val) || 1;
}

// ===== SPINE COMPOSITION =====
// Parse title and author into layout-ready pieces.
function parseSpineContent(book) {
  const rawTitle = book.title || '';
  const author = book.author || null;

  const volMatch = rawTitle.match(/^(.+?)\s+(#\d+|Vol\.?\s*\d+|Book\s+[IVXLCDM\d]+|Part\s+[IVXLCDM\d]+)\s*$/i);
  const subSep = [': ', ' \u2014 ', ' - '];
  let subIdx = -1, subSepUsed = null;
  for (const sep of subSep) {
    const idx = rawTitle.indexOf(sep);
    if (idx > 0 && idx < rawTitle.length - 3) { subIdx = idx; subSepUsed = sep; break; }
  }

  let primary, secondary = null;
  if (volMatch) {
    primary = volMatch[1].trim();
    secondary = volMatch[2].trim();
  } else if (subIdx > 0) {
    primary = rawTitle.substring(0, subIdx).trim();
    secondary = rawTitle.substring(subIdx + subSepUsed.length).trim();
  } else {
    primary = rawTitle;
  }

  let authorInitials = null;
  if (author) {
    const words = author.trim().split(/\s+/).filter(Boolean);
    if (words.length === 1) authorInitials = words[0][0].toUpperCase() + '.';
    else authorInitials = words.map(w => w[0].toUpperCase()).join('.') + '.';
  }

  return { primary, secondary, author, authorInitials };
}

// ===== SPINE TEXT MEASUREMENT =====
// All measurements use a hidden probe element attached to the DOM so the
// browser performs real layout with the real font. Call after fonts load.

const _probe = (() => {
  let el = null;
  return () => {
    if (!el) {
      el = document.createElement('span');
      el.style.cssText = 'position:absolute;top:-9999px;left:-9999px;visibility:hidden;font-family:Thow,Georgia,serif;';
      document.body.appendChild(el);
    }
    return el;
  };
})();

function measureVertical(text, fontSize, fontWeight, maxHeightPx) {
  const el = _probe();
  el.style.writingMode = 'vertical-rl';
  el.style.textOrientation = 'mixed';
  el.style.lineHeight = '1.1';
  el.style.wordBreak = 'break-word';
  el.style.whiteSpace = 'normal';
  el.style.fontSize = fontSize + 'px';
  el.style.fontWeight = fontWeight;
  el.style.maxHeight = maxHeightPx + 'px';
  el.style.maxWidth = '';
  el.style.display = '';
  el.textContent = text;
  return { w: el.offsetWidth, h: el.offsetHeight };
}

function measureHorizontal(text, fontSize, fontWeight, maxWidthPx) {
  const el = _probe();
  el.style.writingMode = 'horizontal-tb';
  el.style.textOrientation = '';
  el.style.lineHeight = '1.15';
  el.style.wordBreak = 'normal';
  el.style.whiteSpace = 'normal';
  el.style.fontSize = fontSize + 'px';
  el.style.fontWeight = fontWeight;
  el.style.maxWidth = maxWidthPx + 'px';
  el.style.maxHeight = '';
  el.style.display = 'inline-block';
  el.textContent = text;
  const w = el.offsetWidth;
  const h = el.offsetHeight;
  const intrinsic = el.scrollWidth;
  return { w, h, overflowed: intrinsic > maxWidthPx + 0.5 };
}

function fitVertical(text, maxW, maxH, sizeLo, sizeHi) {
  let lo = sizeLo, hi = sizeHi, best = sizeLo, bestW = 0, bestH = 0;
  for (let i = 0; i < 14 && lo <= hi; i++) {
    const mid = Math.round((lo + hi) / 2);
    const weight = mid >= 22 ? 500 : 400;
    const m = measureVertical(text, mid, weight, maxH);
    if (m.w <= maxW && m.h <= maxH) {
      best = mid; bestW = m.w; bestH = m.h;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }
  return { size: best, weight: best >= 22 ? 500 : 400, width: bestW, height: bestH };
}

function fitHorizontal(text, maxW, maxH, maxLines, sizeHi, sizeLo) {
  for (let size = sizeHi; size >= sizeLo; size--) {
    const m = measureHorizontal(text, size, 400, maxW);
    if (m.overflowed) continue;
    if (m.h > maxH) continue;
    const lineH = size * 1.15;
    const lines = Math.max(1, Math.round(m.h / lineH));
    if (lines > maxLines) continue;
    return { text, size, weight: 400, width: m.w, height: m.h, lines };
  }
  return null;
}

// ===== SPINE LAYOUT =====
// Given a spine's ACTUAL rendered width/height in pixels, compute layout.
// Zone percentages MUST match CSS exactly (top: 10% h: 64%; top: 74% h: 16%).
function spineLayout(book, widthPx, heightPx) {
  const parsed = parseSpineContent(book);

  // Zone heights — must match CSS percentages exactly.
  // CSS: .spine-top  top:12% height:68%  (pixel range 12-80%)
  // CSS: .spine-bot  top:82% height:6%   (pixel range 82-88%)
  const topZoneH = Math.round(heightPx * 0.68);
  const botZoneH = Math.round(heightPx * 0.06);

  const sidePad = Math.max(6, Math.round(widthPx * 0.10));
  const authorMaxW = Math.max(10, widthPx - sidePad * 2);
  const authorMaxH = botZoneH;

  const hasSecondary = !!parsed.secondary;
  // Title width budget — short titles get more width so they can go large.
  const isShort = parsed.primary.length <= 8;
  const widthFactor = hasSecondary ? 0.40 :
                      isShort ? 0.70 : 0.55;
  const titleMaxW = Math.round(widthPx * widthFactor);
  const titleMaxH = topZoneH;

  // Title caps scale with spine height so the same text feels right on
  // 500px mobile spines and 1200px desktop spines. Calibrated against a
  // reference spine height of 1100px: a 4-char title caps at ~80px there,
  // scaling down proportionally on shorter spines (min 18px cap).
  // Scale factor: clamped between 0.5 (short) and 1.0 (tall).
  const hScale = Math.max(0.5, Math.min(1.0, heightPx / 1100));
  const len = parsed.primary.length;
  const baseCap = len <= 4  ? 80 :
                  len <= 8  ? 60 :
                  len <= 16 ? 44 :
                  len <= 30 ? 32 : 26;
  const titleCap = Math.max(14, Math.round(baseCap * hScale));

  let title = fitVertical(parsed.primary, titleMaxW, titleMaxH, 10, titleCap);

  // If a long title ended up well below its cap AND well under the zone height,
  // it's because single-column physically can't get bigger. Try wrapping.
  // This happens when the title is height-constrained by char count, not width.
  if (parsed.primary.length > 18 && title.size < titleCap * 0.75) {
    const wideW = Math.round(widthPx * (hasSecondary ? 0.55 : 0.85));
    const wrapped = fitVertical(parsed.primary, wideW, titleMaxH, title.size + 1, titleCap);
    if (wrapped.size > title.size) title = wrapped;
  }

  let secondary = null;
  if (hasSecondary) {
    const remainingW = Math.max(0, widthPx - title.width - 10);
    if (remainingW >= 8) {
      const secSize = Math.max(9, Math.round(title.size * 0.72));
      secondary = { text: parsed.secondary, size: secSize, weight: 400 };
    }
  }

  const titleCenter = title.height < titleMaxH * 0.55;

  let author = null;
  if (parsed.author) {
    const full = parsed.author;
    const init = parsed.authorInitials;
    // Author sizes grow with big spines but have a hard legibility floor.
    const authorCap = heightPx > 900 ? 16 : heightPx > 600 ? 14 : 12;
    const authorFloor = 9;
    author = fitHorizontal(full, authorMaxW, authorMaxH, 1, authorCap, authorFloor);
    if (!author && full.includes(' ')) author = fitHorizontal(full, authorMaxW, authorMaxH, 2, authorCap - 1, authorFloor);
    if (!author && init && init !== full) author = fitHorizontal(init, authorMaxW, authorMaxH, 1, authorCap, authorFloor);
    if (!author && init) author = fitHorizontal(init, authorMaxW, authorMaxH, 1, authorCap, 7);
  }

  return {
    primary: { text: parsed.primary, ...title },
    secondary,
    author,
    authorMaxW,
    titleCenter
  };
}

// ===== LIBRARY RENDERING =====
function setView(v) {
  currentView = v;
  localStorage.setItem('tomen_view', v);
  document.querySelectorAll('#view-switch .icon-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  $('lib-body').classList.toggle('spine-active', v === 'spine');
  renderLibrary();
}

function setSort(s) {
  currentSort = s;
  localStorage.setItem('tomen_sort', s);
  renderLibrary();
}

function getLastReadId() {
  return localStorage.getItem('tomen_lastRead') || null;
}

function getSortedLibrary() {
  const sorted = [...library];
  switch (currentSort) {
    case 'title':
      sorted.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      break;
    case 'title-desc':
      sorted.sort((a, b) => (b.title || '').localeCompare(a.title || ''));
      break;
    case 'author':
      sorted.sort((a, b) => (a.author || '').localeCompare(b.author || ''));
      break;
    case 'recent':
      sorted.reverse();
      break;
    case 'progress':
      sorted.sort((a, b) => (b.progress || 0) - (a.progress || 0));
      break;
  }

  // Pull last-read book to front
  const lastId = getLastReadId();
  if (lastId) {
    const idx = sorted.findIndex(b => b.id === lastId);
    if (idx > 0) {
      const [book] = sorted.splice(idx, 1);
      sorted.unshift(book);
    }
  }

  return sorted;
}

function renderLibrary() {
  const body = $('lib-body');
  if (library.length === 0) {
    body.innerHTML = `<div class="empty-lib">
      <i class="ph ph-book-open-text"></i>
      <h3>No books yet</h3>
      <p>Add an EPUB or text file to start reading</p>
    </div>`;
    return;
  }
  const sorted = getSortedLibrary();
  if (currentView === 'text') renderTextView(body, sorted);
  else if (currentView === 'grid') renderGridView(body, sorted);
  else renderSpineView(body, sorted);
}

function renderTextView(el, books) {
  el.innerHTML = '<div class="view-text">' + books.map(b => {
    const p = b.progress || 0;
    const isReading = p > 0 && p < 100;
    return `<div class="tv-item" onclick="openBookById('${b.id}')">
      <div class="tv-title${isReading ? ' reading' : ''}">${esc(b.title)}</div>
      <div class="tv-author">${esc(b.author || 'Unknown')}${isReading ? ' · <span style="font-family:var(--font-mono);font-size:11px">' + Math.round(p) + '%</span>' : ''}</div>
      ${isReading ? '<div class="tv-progress"><div class="tv-progress-fill" style="width:' + p + '%"></div></div>' : ''}
    </div>`;
  }).join('') + '</div>';
}

function renderGridView(el, books) {
  el.innerHTML = '<div class="view-grid">' + books.map(b => {
    const p = b.progress || 0;
    const c = strColor(b.title);
    const cover = b.cover
      ? `<img src="${b.cover}" alt="">`
      : `<div class="gc-placeholder" style="background:linear-gradient(145deg,${c[0]},${c[1]})">
           <div class="gcp-title">${esc(b.title)}</div>
           <div class="gcp-author">${esc(b.author || '')}</div>
         </div>`;
    return `<div class="gc" onclick="openBookById('${b.id}')">
      <div class="gc-cover">${cover}${p > 0 ? '<div class="gc-prog"><div class="gc-prog-fill" style="width:' + p + '%"></div></div>' : ''}</div>
      <div class="gc-title">${esc(b.title)}</div>
      <div class="gc-author">${esc(b.author || 'Unknown')}</div>
    </div>`;
  }).join('') + '</div>';
}

function renderSpineView(el, books) {
  updateSpineScale();
  const lastId = getLastReadId();

  // Build the data model first (dimensions, colors, progress flags)
  const spineData = books.map((b, i) => {
    const w = spineWidth(b);
    const hPct = spineHeight(b);
    let seed = 0;
    for (let j = 0; j < b.title.length; j++) seed += b.title.charCodeAt(j);
    const bandTop = 7 + (seed % 4);      // 7-10%
    const bandBottom = 90 + (seed % 4);  // 90-93%
    const color = b.spineColor || strColor(b.title);
    const hasProgress = (b.progress || 0) > 0 && (b.progress || 0) < 100;
    const isLastRead = b.id === lastId;
    return { book: b, index: i, width: w, heightPct: hPct, color,
      progress: b.progress || 0, bandTop, bandBottom, hasProgress, isLastRead };
  });

  // PASS 1: Render skeleton spines (dimensions only, no text). This lets the
  // browser perform real layout so we can MEASURE each spine's actual height.
  el.innerHTML = '<div class="view-spine-wrap"><div class="view-spine" id="spine-row">' +
    spineData.map((s) => {
      const pinnedClass = s.isLastRead ? ' pinned' : '';
      const bg = `linear-gradient(180deg,${s.color[0]},${s.color[1]})`;
      const spineHtml = `<div class="spine${pinnedClass}" id="spine-${s.index}" style="width:${s.width}px;height:${s.heightPct}%;background:${bg}" onclick="openBookById('${s.book.id}')" title="${esc(s.book.title)}"></div>`;
      const spacer = (s.isLastRead && spineData.length > 1) ?
        '<div class="spine-spacer"><div class="spine-spacer-line"></div></div>' : '';
      return spineHtml + spacer;
    }).join('') + '</div></div>';

  // Wait for fonts to load, then measure and fill in text. If fonts aren't
  // ready, measurements are poisoned by the fallback font's metrics.
  const paintText = () => {
    spineData.forEach((s) => {
      const spineEl = document.getElementById(`spine-${s.index}`);
      if (!spineEl) return;
      const hPx = spineEl.clientHeight;
      if (hPx <= 0) return;
      const layout = spineLayout(s.book, s.width, hPx);

      const p = layout.primary;
      const primarySpacing = p.size >= 18 ? '-0.2px' : p.size >= 12 ? '0.2px' : '0.4px';
      const primaryHtml = `<span class="spine-title" style="font-size:${p.size}px;font-weight:${p.weight};letter-spacing:${primarySpacing}">${esc(p.text)}</span>`;

      let secondaryHtml = '';
      if (layout.secondary) {
        const sec = layout.secondary;
        secondaryHtml = `<span class="spine-secondary" style="font-size:${sec.size}px;font-weight:${sec.weight}">${esc(sec.text)}</span>`;
      }

      let authorHtml = '';
      if (layout.author) {
        const a = layout.author;
        authorHtml = `<span class="spine-author" style="font-size:${a.size}px;font-weight:${a.weight};max-width:${layout.authorMaxW}px">${esc(a.text)}</span>`;
      }

      const centerClass = layout.titleCenter ? ' center' : '';
      spineEl.innerHTML = `
        <div class="spine-pages"></div>
        <div class="spine-band" style="top:${s.bandTop}%"></div>
        <div class="spine-band" style="top:${s.bandBottom}%"></div>
        ${s.hasProgress ? '<div class="spine-bookmark"></div>' : ''}
        <div class="spine-top${centerClass}">${primaryHtml}${secondaryHtml}</div>
        ${authorHtml ? `<div class="spine-bot">${authorHtml}</div>` : ''}
        ${s.progress > 0 ? '<div class="spine-prog"><div class="spine-prog-fill" style="width:' + s.progress + '%"></div></div>' : ''}
      `;
    });
  };

  // Wait for Thow to actually load, then measure and fill in text.
  // document.fonts.load() forces a fetch+load of the named font — unlike
  // document.fonts.ready which only waits for already-requested fonts.
  const loadAndPaint = async () => {
    try {
      await Promise.all([
        document.fonts.load('14px Thow'),
        document.fonts.load('bold 14px Thow'),
      ]);
    } catch {}
    paintText();
  };

  if (document.fonts && document.fonts.load) {
    loadAndPaint();
  } else {
    requestAnimationFrame(paintText);
  }

  // Vertical mouse wheel → horizontal scroll
  const wrap = el.querySelector('.view-spine-wrap');
  if (wrap) {
    wrap.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        wrap.scrollLeft += e.deltaY;
        e.preventDefault();
      }
    }, { passive: false });
  }

  backfillSpineColors();
}

// Backfill spineColor for any books that don't have it yet (one-time migration)
let backfillRunning = false;
async function backfillSpineColors() {
  if (backfillRunning) return;
  const missing = library.filter(b => !b.spineColor && b.cover);
  if (missing.length === 0) return;
  backfillRunning = true;

  // Process in parallel batches of 4 to avoid blocking
  const batchSize = 4;
  for (let i = 0; i < missing.length; i += batchSize) {
    const batch = missing.slice(i, i + batchSize);
    await Promise.all(batch.map(async (book) => {
      const color = await extractColor(book.cover);
      if (color) {
        book.spineColor = color;
        await saveBookMeta(book);
        // Update the spine in the DOM if we're still on spine view
        if (currentView === 'spine') {
          const idx = library.findIndex(b => b.id === book.id);
          const el = $('spine-' + idx);
          if (el) el.style.background = `linear-gradient(180deg,${color[0]},${color[1]})`;
        }
      }
    }));
    // Yield between batches so the UI stays responsive
    await new Promise(r => setTimeout(r, 0));
  }
  backfillRunning = false;
}

// ===== FILE HANDLING =====
const SUPPORTED_EXT = ['.epub', '.txt', '.html', '.htm'];
function isSupportedFile(name) { return SUPPORTED_EXT.some(ext => name.toLowerCase().endsWith(ext)); }

async function handleFolderPick() {
  if (window.showDirectoryPicker) {
    try {
      const dirHandle = await window.showDirectoryPicker();
      const files = [];
      await collectFilesFromDir(dirHandle, files);
      if (files.length === 0) { alert('No supported files found (.epub, .txt, .html, .htm)'); return; }
      await importFiles(files);
    } catch (err) { if (err.name !== 'AbortError') console.error(err); }
  } else {
    const input = document.createElement('input');
    input.type = 'file'; input.webkitdirectory = true; input.multiple = true;
    input.onchange = async (e) => {
      const all = Array.from(e.target.files).filter(f => isSupportedFile(f.name));
      if (all.length === 0) { alert('No supported files found (.epub, .txt, .html, .htm)'); return; }
      await importFiles(all);
    };
    input.click();
  }
}

async function collectFilesFromDir(dirHandle, files) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file' && isSupportedFile(entry.name)) files.push(await entry.getFile());
    else if (entry.kind === 'directory') await collectFilesFromDir(entry, files);
  }
}

async function importFiles(files) {
  const existingTitles = new Set(library.map(b => b.title.toLowerCase()));
  const newFiles = files.filter(f => !existingTitles.has(f.name.replace(/\.[^.]+$/, '').toLowerCase()));
  if (newFiles.length === 0) { alert('All books in this folder are already in your library.'); return; }
  showLoading(true, `Importing 0 / ${newFiles.length}…`);
  let n = 0, skipped = 0;

  for (const file of newFiles) {
    // Per-file timeout so one bad file can't hang the whole import
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('timeout after 30s')), 30000)
    );
    const importPromise = (async () => {
      if (file.name.toLowerCase().endsWith('.epub')) await loadEpub(file, true);
      else await loadTextFile(file, true);
    })();

    try {
      await Promise.race([importPromise, timeoutPromise]);
      n++;
    } catch (err) {
      console.warn(`Skipped ${file.name}:`, err);
      skipped++;
    }
    showLoading(true, `Importing ${n} / ${newFiles.length}…`);
    // Yield to the event loop briefly so UI can update
    await new Promise(r => setTimeout(r, 0));
  }

  renderLibrary();
  showLoading(false);
  if (skipped > 0) {
    setTimeout(() => alert(`Imported ${n} books. ${skipped} could not be read (likely DRM-protected or corrupt).`), 100);
  }
}

async function handleFiles(e) {
  for (const file of Array.from(e.target.files)) {
    if (file.name.endsWith('.epub')) await loadEpub(file);
    else await loadTextFile(file);
  }
  e.target.value = '';
}

async function loadTextFile(file, batch = false) {
  const text = await file.text();
  const title = file.name.replace(/\.[^.]+$/, '');
  const html = `<h1>${esc(title)}</h1>` + text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
  const book = {
    id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
    title, author: '', cover: null,
    chapters: [{ title, html }], toc: [{ title, index: 0 }],
    progress: 0, chapterIndex: 0, scrollPos: 0
  };
  await saveBookMeta(book);
  await saveBookContent(book);
  // Add lightweight meta to in-memory library (without chapters/toc)
  library.push({
    id: book.id, title: book.title, author: book.author, cover: book.cover,
    progress: 0, chapterIndex: 0, scrollPos: 0,
    chapterCount: 1, contentSize: html.length
  });
  if (!batch) renderLibrary();
}

async function loadEpub(file, batch = false) {
  if (!batch) showLoading(true);
  try {
    const zip = await JSZip.loadAsync(file);
    const containerFile = zip.file('META-INF/container.xml');
    if (!containerFile) throw new Error('Missing container.xml — not a valid EPUB');
    const containerXml = await containerFile.async('text');
    const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
    const rootfileEl = containerDoc.querySelector('rootfile');
    if (!rootfileEl) throw new Error('Missing rootfile reference');
    const rootfilePath = rootfileEl.getAttribute('full-path');
    const rootDir = rootfilePath.includes('/') ? rootfilePath.substring(0, rootfilePath.lastIndexOf('/') + 1) : '';
    const opfFile = zip.file(rootfilePath);
    if (!opfFile) throw new Error('Missing OPF file');
    const opfXml = await opfFile.async('text');
    const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

    const titleEl = opfDoc.querySelector('metadata title');
    const authorEl = opfDoc.querySelector('metadata creator');
    const title = titleEl ? titleEl.textContent : file.name.replace('.epub', '');
    const author = authorEl ? authorEl.textContent : '';

    let cover = null;
    const coverMeta = opfDoc.querySelector('meta[name="cover"]');
    if (coverMeta) {
      const coverItem = opfDoc.querySelector(`item[id="${coverMeta.getAttribute('content')}"]`);
      if (coverItem) {
        const cf = zip.file(rootDir + coverItem.getAttribute('href')) || zip.file(coverItem.getAttribute('href'));
        if (cf) cover = await blobToDataURL(await cf.async('blob'));
      }
    }
    if (!cover) {
      const ci = opfDoc.querySelector('item[properties="cover-image"]');
      if (ci) {
        const cf = zip.file(rootDir + ci.getAttribute('href')) || zip.file(ci.getAttribute('href'));
        if (cf) cover = await blobToDataURL(await cf.async('blob'));
      }
    }

    const spineItems = Array.from(opfDoc.querySelectorAll('spine itemref'));
    const manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => { manifest[item.getAttribute('id')] = item.getAttribute('href'); });

    const bookChapters = [];
    const imageCache = {};

    for (const si of spineItems) {
      const href = manifest[si.getAttribute('idref')];
      if (!href) continue;
      const chPath = rootDir + href;
      const chFile = zip.file(chPath) || zip.file(href);
      if (!chFile) continue;
      const chDoc = new DOMParser().parseFromString(await chFile.async('text'), 'application/xhtml+xml');
      const body = chDoc.body || chDoc.querySelector('body');
      if (!body) continue;

      for (const img of body.querySelectorAll('img, image')) {
        const src = img.getAttribute('src') || img.getAttribute('xlink:href');
        if (!src) continue;
        const chDir = chPath.includes('/') ? chPath.substring(0, chPath.lastIndexOf('/') + 1) : '';
        const imgPath = resolveHref(chDir, src);
        if (!imageCache[imgPath]) {
          const imgFile = zip.file(imgPath);
          if (imgFile) imageCache[imgPath] = await blobToDataURL(await imgFile.async('blob'));
        }
        if (imageCache[imgPath]) img.setAttribute('src', imageCache[imgPath]);
      }
      for (const si2 of body.querySelectorAll('svg image')) {
        const h2 = si2.getAttribute('xlink:href') || si2.getAttribute('href');
        if (h2 && imageCache[resolveHref(rootDir, h2)]) si2.setAttribute('xlink:href', imageCache[resolveHref(rootDir, h2)]);
      }

      const ct = body.querySelector('h1, h2, h3, title');
      bookChapters.push({ title: ct ? ct.textContent.trim() : `Chapter ${bookChapters.length + 1}`, html: body.innerHTML });
    }

    const bookToc = bookChapters.map((ch, i) => ({ title: ch.title, index: i }));
    const ncxItem = opfDoc.querySelector('item[media-type="application/x-dtbncx+xml"]');
    if (ncxItem) {
      const ncxFile = zip.file(rootDir + ncxItem.getAttribute('href')) || zip.file(ncxItem.getAttribute('href'));
      if (ncxFile) {
        const ncxDoc = new DOMParser().parseFromString(await ncxFile.async('text'), 'application/xml');
        const navPoints = ncxDoc.querySelectorAll('navMap > navPoint');
        if (navPoints.length > 0) {
          bookToc.length = 0;
          navPoints.forEach(np => {
            const label = np.querySelector('navLabel text');
            const content = np.querySelector('content');
            if (label && content) {
              const src = content.getAttribute('src').split('#')[0];
              const idx = bookChapters.findIndex((_, i) => {
                const h = manifest[spineItems[i]?.getAttribute('idref')];
                return h === src || h?.endsWith(src);
              });
              if (idx >= 0) bookToc.push({ title: label.textContent.trim(), index: idx });
            }
          });
        }
      }
    }

    const finalToc = bookToc.length > 0 ? bookToc : bookChapters.map((ch, i) => ({ title: ch.title, index: i }));
    const contentSize = bookChapters.reduce((s, c) => s + (c.html?.length || 0), 0);

    // Extract spine color from cover during import (once) so it persists
    let spineColor = null;
    if (cover) {
      spineColor = await extractColor(cover);
    }
    if (!spineColor) spineColor = strColor(title);

    const book = {
      id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
      title, author, cover, chapters: bookChapters, toc: finalToc,
      progress: 0, chapterIndex: 0, scrollPos: 0, spineColor
    };
    await saveBookMeta(book);
    await saveBookContent(book);
    library.push({
      id: book.id, title: book.title, author: book.author, cover: book.cover,
      progress: 0, chapterIndex: 0, scrollPos: 0,
      chapterCount: bookChapters.length, contentSize, spineColor
    });
    if (!batch) renderLibrary();
  } catch (err) {
    console.error('EPUB parse error:', err);
    if (!batch) alert('Could not open this EPUB. It may be DRM-protected or unsupported.');
    throw err;  // re-throw so importFiles can count it as skipped
  }
  if (!batch) showLoading(false);
}

function resolveHref(base, rel) {
  if (rel.startsWith('/') || rel.startsWith('http')) return rel;
  const parts = (base + rel).split('/');
  const out = [];
  for (const p of parts) { if (p === '..') out.pop(); else if (p !== '.') out.push(p); }
  return out.join('/');
}

function blobToDataURL(blob) {
  return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
}

// ===== READER =====
// Paginated two-page spread layout. Each "spread" is 2 columns wide.
// CSS multi-column handles the text flow; we translate between spreads.
// Chapter boundaries are hard — new chapter renders fresh at spread 0.

let currentSpread = 0;       // 0-indexed spread within current chapter
let totalSpreads = 1;        // computed after layout

async function openBookById(id) {
  const meta = library.find(b => b.id === id);
  if (!meta) return;
  localStorage.setItem('tomen_lastRead', id);
  showLoading(true, 'Opening book…');
  try {
    const content = await loadBookContent(meta.id);
    currentBook = { ...meta, chapters: content.chapters, toc: content.toc };
    // Migrate legacy `bookmarks` field → `marks` (preserves data from earlier versions)
    if (!Array.isArray(currentBook.marks)) {
      currentBook.marks = Array.isArray(currentBook.bookmarks) ? currentBook.bookmarks : [];
    }
    delete currentBook.bookmarks;
    chapters = currentBook.chapters;
    toc = currentBook.toc;
    currentChapterIndex = currentBook.chapterIndex || 0;
    currentSpread = currentBook.spreadIndex || 0;
    $('r-title').textContent = currentBook.title;
    $('screen-lib').classList.remove('active');
    $('screen-reader').classList.add('active');
    uiVisible = true;
    $('r-toolbar').classList.remove('hidden');
    document.body.classList.add('r-ui-visible');
    renderChapter();
    buildTOC();
  } catch (err) {
    console.error('Failed to open book:', err);
    alert('Could not open this book.');
  } finally {
    showLoading(false);
  }
}

function showLibrary() {
  saveProgress();
  $('screen-reader').classList.remove('active');
  $('screen-lib').classList.add('active');
  document.body.classList.remove('r-ui-visible');
  renderLibrary();
}

// Render the current chapter's HTML into the pages container, then measure
// how many spreads it occupies.
function renderChapter() {
  const pagesEl = $('r-pages');
  const innerEl = $('r-inner');
  innerEl.innerHTML = chapters[currentChapterIndex]?.html || '<p>No content</p>';
  // Reset transform before measuring
  pagesEl.style.transition = 'none';
  pagesEl.style.transform = 'translateX(0)';
  // Force reflow, then restore transition
  pagesEl.offsetHeight;
  pagesEl.style.transition = '';
  // Measure after layout settles (including font loading)
  requestAnimationFrame(() => {
    measureSpreads();
    // Clamp currentSpread in case chapter shrunk
    if (currentSpread >= totalSpreads) currentSpread = totalSpreads - 1;
    if (currentSpread < 0) currentSpread = 0;
    applySpread();
    updateProgress();
  });
}

// Measure how many spreads (pairs of columns) the current chapter occupies.
// In a 2-column layout with gap G, the Nth pair of columns sits at x=(N-1)(W+G).
// We translate by -(spread * (W+G)) to bring the right pair into view.
function measureSpreads() {
  const pagesEl = $('r-pages');
  const bookEl = $('r-book');
  const spreadWidth = bookEl.clientWidth;
  const contentWidth = pagesEl.scrollWidth;
  if (spreadWidth <= 0 || contentWidth <= 0) {
    totalSpreads = 1;
    return;
  }
  const style = getComputedStyle(pagesEl);
  const gap = parseFloat(style.columnGap) || 80;
  const pairAdvance = spreadWidth + gap;
  // scrollWidth covers N columns + (N-1) gaps. Num columns ~= (scrollWidth+gap) / (colWidth+gap)
  const colWidth = (spreadWidth - gap) / 2;
  const approxCols = Math.max(1, Math.round((contentWidth + gap) / (colWidth + gap)));
  totalSpreads = Math.max(1, Math.ceil(approxCols / 2));
}

// Apply the current spread by translating the pages container.
function applySpread() {
  const pagesEl = $('r-pages');
  const bookEl = $('r-book');
  const spreadWidth = bookEl.clientWidth;
  const style = getComputedStyle(pagesEl);
  const gap = parseFloat(style.columnGap) || 80;
  const pairAdvance = spreadWidth + gap;
  pagesEl.style.transform = `translateX(${-currentSpread * pairAdvance}px)`;
}

// Navigate one spread forward. Crosses into next chapter at the end.
function readerNext() {
  if (!currentBook) return;
  if (currentSpread < totalSpreads - 1) {
    currentSpread++;
    applySpread();
    updateProgress();
    saveProgress();
  } else if (currentChapterIndex < chapters.length - 1) {
    // Fade out, advance chapter, fade in
    fadeSwap(() => {
      currentChapterIndex++;
      currentSpread = 0;
      renderChapter();
      saveProgress();
    });
  }
}

// Navigate one spread backward. Crosses into previous chapter at the start.
function readerPrev() {
  if (!currentBook) return;
  if (currentSpread > 0) {
    currentSpread--;
    applySpread();
    updateProgress();
    saveProgress();
  } else if (currentChapterIndex > 0) {
    fadeSwap(() => {
      currentChapterIndex--;
      // Jump to last spread of the previous chapter after render measures it
      currentSpread = Infinity;  // renderChapter clamps to totalSpreads - 1
      renderChapter();
      saveProgress();
    });
  }
}

// Fade the current pages out, run callback (which re-renders), fade in.
function fadeSwap(cb) {
  const pagesEl = $('r-pages');
  pagesEl.classList.add('fade');
  setTimeout(() => {
    cb();
    requestAnimationFrame(() => pagesEl.classList.remove('fade'));
  }, 180);
}

function prevChapter() { if (currentChapterIndex > 0) { fadeSwap(() => { currentChapterIndex--; currentSpread = 0; renderChapter(); saveProgress(); }); } }
function nextChapter() { if (currentChapterIndex < chapters.length - 1) { fadeSwap(() => { currentChapterIndex++; currentSpread = 0; renderChapter(); saveProgress(); }); } }

function goToChapter(index) {
  fadeSwap(() => {
    currentChapterIndex = index;
    currentSpread = 0;
    renderChapter();
    saveProgress();
    toggleTOC();
  });
}

function updateProgress() {
  if (!chapters.length) return;
  const chapterPct = totalSpreads > 1 ? currentSpread / (totalSpreads - 1) : 1;
  const pct = ((currentChapterIndex + chapterPct) / chapters.length) * 100;
  $('r-progress').style.width = pct + '%';
  $('r-pct').textContent = Math.round(pct) + '%';
}

function saveProgress() {
  if (!currentBook) return;
  currentBook.chapterIndex = currentChapterIndex;
  currentBook.spreadIndex = currentSpread;
  const chapterPct = totalSpreads > 1 ? currentSpread / (totalSpreads - 1) : 1;
  currentBook.progress = ((currentChapterIndex + chapterPct) / chapters.length) * 100;
  const idx = library.findIndex(b => b.id === currentBook.id);
  if (idx >= 0) library[idx] = currentBook;
  saveLibrary();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!$('screen-reader').classList.contains('active')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
    readerNext();
    e.preventDefault();
  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
    readerPrev();
    e.preventDefault();
  }
});

// Swipe navigation and gesture-based settings (real-time).
// PAGE TURN:    horizontal swipe anywhere on the book area (crosses 15% width threshold).
// FONT SIZE:    vertical swipe on the LEFT edge strip (40px wide).
// LINE HEIGHT:  vertical swipe on the RIGHT edge strip (40px wide).
// READING WIDTH: horizontal swipe on the BOTTOM strip (full-width).
(() => {
  const V_STEP = 40;
  const W_STEP = 20;
  const MODE_DECIDE_THRESH = 24;

  let startX = 0, startY = 0;
  let tracking = false;
  // 'undecided' | 'horizontal' | 'vertical-font' | 'vertical-line' | 'width'
  let mode = 'undecided';
  let lastStep = 0;

  const rc = $('r-content');
  if (!rc) return;

  function swipeThreshold() {
    return Math.max(60, window.innerWidth * 0.15);
  }
  function pickStart(e) {
    if (e.touches.length !== 1) return null;
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  function stripAt(target) {
    if (!target || !target.closest) return null;
    const el = target.closest('[data-strip]');
    return el ? el.dataset.strip : null;  // 'font' | 'line' | 'width'
  }

  const swipeRing = () => $('r-swipe-ring');

  function showSwipeProgress(dx, thresh) {
    const ring = swipeRing();
    if (!ring) return;
    // Direction class — pick whichever side the user is swiping toward.
    // Negative dx means swiping left (turning to next page) → show on right.
    // Positive dx means swiping right (turning to prev page) → show on left.
    const dir = dx < 0 ? 'next' : 'prev';
    ring.classList.toggle('dir-prev', dir === 'prev');
    ring.classList.toggle('dir-next', dir === 'next');
    // Opacity ramps with swipe progress; eased to bias visibility earlier
    // in the gesture so the user gets feedback even on small drags.
    const ratio = Math.min(1, Math.abs(dx) / thresh);
    ring.style.opacity = Math.pow(ratio, 0.7).toFixed(3);
  }
  function hideSwipeProgress() {
    const ring = swipeRing();
    if (ring) ring.style.opacity = '';
  }

  rc.addEventListener('touchstart', (e) => {
    const s = pickStart(e);
    if (!s) return;
    startX = s.x;
    startY = s.y;
    tracking = true;
    lastStep = 0;
    // Route to a dedicated strip if the touch started on one.
    const strip = stripAt(e.target);
    if (strip === 'font')  mode = 'vertical-font';
    else if (strip === 'line')  mode = 'vertical-line';
    else if (strip === 'width') mode = 'width';
    else                        mode = 'undecided';  // book area — decide between page-turn and nothing
  }, { passive: true });

  rc.addEventListener('touchmove', (e) => {
    if (!tracking) return;
    const t = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const absX = Math.abs(dx), absY = Math.abs(dy);

    // Book-area gesture: only horizontal page-turn is allowed here.
    // Vertical drag on book does nothing (no more accidental font changes).
    if (mode === 'undecided') {
      if (absX >= MODE_DECIDE_THRESH && absX > absY * 1.3) mode = 'horizontal';
      else return;
    }

    if (mode === 'horizontal') {
      showSwipeProgress(dx, swipeThreshold());
    } else if (mode === 'vertical-font' || mode === 'vertical-line') {
      const targetStep = Math.trunc(-dy / V_STEP);
      if (targetStep !== lastStep) {
        const delta = targetStep - lastStep;
        lastStep = targetStep;
        if (mode === 'vertical-font') adjustFontSize(delta);
        else adjustLineHeight(delta);
      }
      if (e.cancelable) e.preventDefault();
    } else if (mode === 'width') {
      const targetStep = Math.trunc(dx / W_STEP);
      if (targetStep !== lastStep) {
        const delta = targetStep - lastStep;
        lastStep = targetStep;
        adjustReadingWidth(delta);
      }
      if (e.cancelable) e.preventDefault();
    }
  }, { passive: false });

  rc.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    if (mode === 'horizontal') {
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      if (Math.abs(dx) >= swipeThreshold()) {
        if (dx < 0) readerNext();
        else readerPrev();
      }
      hideSwipeProgress();
    }
    mode = 'undecided';
  }, { passive: true });

  rc.addEventListener('touchcancel', () => {
    tracking = false;
    mode = 'undecided';
    hideSwipeProgress();
  }, { passive: true });

  // Desktop: also handle mouse drags on the edge/bottom strips so users with
  // a mouse can adjust settings the same way. Page-turn for desktop stays on click-and-hold.
  let mdActive = false;
  let mdMode = null;
  let mdStartX = 0, mdStartY = 0, mdLastStep = 0;

  rc.addEventListener('mousedown', (e) => {
    const strip = stripAt(e.target);
    if (!strip) return;
    mdActive = true;
    mdMode = strip === 'font' ? 'vertical-font' :
             strip === 'line' ? 'vertical-line' : 'width';
    mdStartX = e.clientX;
    mdStartY = e.clientY;
    mdLastStep = 0;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!mdActive) return;
    const dx = e.clientX - mdStartX;
    const dy = e.clientY - mdStartY;
    if (mdMode === 'vertical-font' || mdMode === 'vertical-line') {
      const targetStep = Math.trunc(-dy / V_STEP);
      if (targetStep !== mdLastStep) {
        const delta = targetStep - mdLastStep;
        mdLastStep = targetStep;
        if (mdMode === 'vertical-font') adjustFontSize(delta);
        else adjustLineHeight(delta);
      }
    } else if (mdMode === 'width') {
      const targetStep = Math.trunc(dx / W_STEP);
      if (targetStep !== mdLastStep) {
        const delta = targetStep - mdLastStep;
        mdLastStep = targetStep;
        adjustReadingWidth(delta);
      }
    }
  });
  window.addEventListener('mouseup', () => { mdActive = false; mdMode = null; });
})();

// ===== PAGE-TURN HOLD MACHINERY =====
// Shared state + helpers for the circular hold-to-turn indicator, used by
// both mouse (click-and-hold) and touch (press-and-hold).
const HOLD_MS = 400;
let _holdTimer = null;
let _holdDir = null;
let _hoverDir = null;

function _ring() { return $('r-hold-ring'); }
function _fill() { return _ring()?.querySelector('.r-hold-fill'); }

function _positionRing(x, y) {
  const r = _ring();
  if (!r) return;
  const rc = $('r-content').getBoundingClientRect();
  r.style.left = (x - rc.left) + 'px';
  r.style.top  = (y - rc.top) + 'px';
}
function _setDirClass(dir) {
  const r = _ring();
  if (!r) return;
  r.classList.remove('dir-prev', 'dir-next');
  if (dir) r.classList.add('dir-' + dir);
}
function showHover(dir, x, y) {
  const r = _ring(), f = _fill();
  if (!r || !f) return;
  _hoverDir = dir;
  _setDirClass(dir);
  _positionRing(x, y);
  f.style.transition = 'none';
  f.style.strokeDashoffset = '106.8';
  r.classList.remove('active');
  r.classList.add('hover');
}
function hideHover() {
  _hoverDir = null;
  const r = _ring();
  if (!r) return;
  if (!_holdTimer) r.classList.remove('hover', 'active');
  _setDirClass(null);
}
function startHold(dir, x, y) {
  cancelHold();
  _holdDir = dir;
  const r = _ring(), f = _fill();
  if (!r || !f) return;
  _setDirClass(dir);
  _positionRing(x, y);
  f.style.transition = 'none';
  f.style.strokeDashoffset = '106.8';
  f.offsetHeight;  // reflow
  f.style.transition = `stroke-dashoffset ${HOLD_MS}ms linear`;
  f.style.strokeDashoffset = '0';
  r.classList.remove('hover');
  r.classList.add('active');
  _holdTimer = setTimeout(() => {
    _holdTimer = null;
    if (dir === 'next') readerNext();
    else if (dir === 'prev') readerPrev();
    cancelHold(true);
  }, HOLD_MS);
}
function cancelHold(completed) {
  if (_holdTimer) { clearTimeout(_holdTimer); _holdTimer = null; }
  _holdDir = null;
  const r = _ring(), f = _fill();
  if (!r) return;
  r.classList.remove('active');
  if (f && !completed) {
    f.style.transition = 'none';
    f.style.strokeDashoffset = '106.8';
  }
  if (_hoverDir) r.classList.add('hover');
  else r.classList.remove('hover');
}
function isHolding() { return _holdTimer !== null; }

// ===== MOUSE CLICK-AND-HOLD =====
// Hover shows empty ring with arrow; press starts the fill timer.
// Only enabled on devices with a real hover-capable pointer (desktop mouse / trackpad).
// On touch devices, browsers synthesize phantom mouse events that would otherwise
// trigger this UI mid-swipe — gate the whole IIFE behind a pointer-capability check.
(() => {
  const hasPointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (!hasPointer) return;

  document.addEventListener('mousemove', (e) => {
    const zone = e.target.closest && e.target.closest('.r-click-zone');
    if (zone) {
      const dir = zone.dataset.dir;
      if (dir !== _hoverDir) showHover(dir, e.clientX, e.clientY);
      else _positionRing(e.clientX, e.clientY);
    } else if (_hoverDir) {
      hideHover();
    }
  });
  document.addEventListener('mousedown', (e) => {
    const zone = e.target.closest && e.target.closest('.r-click-zone');
    if (!zone || e.button !== 0) return;
    const dir = zone.dataset.dir;
    if (!dir) return;
    startHold(dir, e.clientX, e.clientY);
    e.preventDefault();
  });
  document.addEventListener('mouseup', () => cancelHold());
  document.addEventListener('mouseleave', () => { hideHover(); cancelHold(); });
  window.addEventListener('blur', () => { hideHover(); cancelHold(); });
})();

// ===== DEBUG: reveal interaction zones =====
// Press Shift+D to toggle visual overlays showing click/swipe zones.
document.addEventListener('keydown', (e) => {
  if (e.shiftKey && (e.key === 'D' || e.key === 'd')) {
    const on = document.body.classList.toggle('r-debug');
    console.log('[tomen] debug zones', on ? 'ON' : 'OFF');
    e.preventDefault();
  }
});

// Adjust font size by N steps (each = 1px), clamped to slider range.
function adjustFontSize(delta) {
  const sl = $('sl-fontsize');
  if (!sl || delta === 0) return;
  const min = parseInt(sl.min), max = parseInt(sl.max);
  const cur = parseInt(sl.value);
  const next = Math.max(min, Math.min(max, cur + delta));
  if (next === cur) return;
  sl.value = next;
  setFontSize(next);
  showGestureToast(`Font size: ${next}px`);
}

// Adjust line height by N steps, clamped to slider range.
function adjustLineHeight(delta) {
  const sl = $('sl-lineheight');
  if (!sl || delta === 0) return;
  const min = parseInt(sl.min), max = parseInt(sl.max);
  const cur = parseInt(sl.value);
  const next = Math.max(min, Math.min(max, cur + delta));
  if (next === cur) return;
  sl.value = next;
  setLineHeight(next);
  showGestureToast(`Line height: ${(next / 10).toFixed(1)}`);
}

// Adjust reading width by N steps of 50px each, clamped to slider range.
function adjustReadingWidth(delta) {
  const sl = $('sl-width');
  if (!sl || delta === 0) return;
  const step = parseInt(sl.step) || 50;
  const min = parseInt(sl.min), max = parseInt(sl.max);
  const cur = parseInt(sl.value);
  const next = Math.max(min, Math.min(max, cur + delta * step));
  if (next === cur) return;
  sl.value = next;
  setReadingWidth(next);
  showGestureToast(`Width: ${next}px`);
}

// Brief floating indicator during gesture-based settings changes.
let _gestureToastTm = null;
function showGestureToast(text) {
  let el = document.getElementById('gesture-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'gesture-toast';
    el.className = 'gesture-toast';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(_gestureToastTm);
  _gestureToastTm = setTimeout(() => el.classList.remove('show'), 900);
}

// Recompute on window resize (text reflows, spread count changes)
let _resizeTm = null;
window.addEventListener('resize', () => {
  if (!$('screen-reader').classList.contains('active')) return;
  clearTimeout(_resizeTm);
  _resizeTm = setTimeout(() => {
    measureSpreads();
    if (currentSpread >= totalSpreads) currentSpread = totalSpreads - 1;
    applySpread();
    updateProgress();
  }, 120);
});

// ===== TOC =====
function buildTOC() {
  $('toc-list').innerHTML = toc.map(item =>
    `<button class="toc-item${item.index === currentChapterIndex ? ' active' : ''}" onclick="goToChapter(${item.index})">${esc(item.title)}</button>`
  ).join('');
}
function toggleTOC() { $('ov-toc').classList.toggle('open'); }

// ===== UI TOGGLE =====
function toggleReaderUI() {
  uiVisible = !uiVisible;
  $('r-toolbar').classList.toggle('hidden', !uiVisible);
  // Edge strip indicators fade with the toolbar
  document.body.classList.toggle('r-ui-visible', uiVisible);
}

// ===== SETTINGS =====
function toggleSettings() { $('ov-settings').classList.toggle('open'); }

// ===== PROFILE =====
function toggleProfile() {
  const ov = $('ov-profile');
  ov.classList.toggle('open');
  if (ov.classList.contains('open')) {
    $('profile-name').value = localStorage.getItem('tomen_name') || '';
  }
}
function updateProfileName(name) {
  localStorage.setItem('tomen_name', name.trim());
  renderGreeting();
}

// ===== IMPORT MENU =====
function toggleImportMenu() {
  $('import-menu').classList.toggle('open');
}
function closeImportMenu() {
  $('import-menu').classList.remove('open');
}
// Close import menu when clicking outside
document.addEventListener('click', e => {
  const wrap = document.querySelector('.import-wrap');
  if (wrap && !wrap.contains(e.target)) closeImportMenu();
});

function setTheme(theme) {
  document.body.className = theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  localStorage.setItem('tomen_theme', theme);
}

function setFontSize(v) {
  document.documentElement.style.setProperty('--font-size', v + 'px');
  $('fs-display').textContent = v;
  localStorage.setItem('tomen_fontSize', v);
  remeasureReader();
}
function setLineHeight(v) {
  const lh = (v / 10).toFixed(1);
  document.documentElement.style.setProperty('--line-height', lh);
  $('lh-display').textContent = lh;
  localStorage.setItem('tomen_lineHeight', v);
  remeasureReader();
}
function setReadingWidth(v) {
  document.documentElement.style.setProperty('--reading-width', v + 'px');
  const disp = $('rw-display');
  if (disp) disp.textContent = v;
  localStorage.setItem('tomen_readingWidth', v);
  remeasureReader();
}
// Re-measure and reapply spread when the reader's content reflows.
function remeasureReader() {
  if (!$('screen-reader').classList.contains('active')) return;
  if (!currentBook) return;
  requestAnimationFrame(() => {
    measureSpreads();
    if (currentSpread >= totalSpreads) currentSpread = totalSpreads - 1;
    if (currentSpread < 0) currentSpread = 0;
    applySpread();
    updateProgress();
  });
}
function showLoading(show, msg) {
  $('loading').classList.toggle('active', show);
  if (msg) $('loading-text').textContent = msg;
  else if (show) $('loading-text').textContent = 'Opening book…';
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (!$('screen-reader').classList.contains('active')) return;
  if (e.key === 'Escape') showLibrary();
});

// ===== SPINE SCROLL — translate vertical wheel to horizontal =====
document.addEventListener('wheel', e => {
  const wrap = document.querySelector('.view-spine-wrap');
  if (!wrap || !wrap.contains(e.target)) return;
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    wrap.scrollLeft += e.deltaY;
  }
}, { passive: false });

// ===== GREETING =====
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function renderGreeting() {
  const name = localStorage.getItem('tomen_name') || '';
  const el = $('lib-greeting');
  if (name) {
    el.innerHTML = `${getGreeting()}, <span class="greeting-name" onclick="toggleProfile()" title="Profile">${esc(name)}</span>`;
  } else {
    el.innerHTML = getGreeting();
  }
}

// ===== INIT =====
(async function init() {
  const t = localStorage.getItem('tomen_theme') || '';
  setTheme(t);
  const fs = localStorage.getItem('tomen_fontSize');
  if (fs) { setFontSize(fs); $('sl-fontsize').value = fs; }
  const lh = localStorage.getItem('tomen_lineHeight');
  if (lh) { setLineHeight(lh); $('sl-lineheight').value = lh; }
  const rw = localStorage.getItem('tomen_readingWidth');
  if (rw) { setReadingWidth(rw); if ($('sl-width')) $('sl-width').value = rw; }
  renderGreeting();

  // Open IndexedDB and load library
  try {
    await openDB();
    await migrateFromLocalStorage();
    await loadLibrary();
  } catch (err) {
    console.error('Storage init failed:', err);
  }

  // Restore sort
  $('sort-select').value = currentSort;

  setView(currentView);
})();
</script>

<!-- Service Worker -->
<script>
let waitingSW = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    if (reg.waiting) showUpdateToast(reg.waiting);
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateToast(nw);
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}
function showUpdateToast(sw) { waitingSW = sw; $('update-toast').classList.add('visible'); }
function applyUpdate() { if (waitingSW) waitingSW.postMessage('skipWaiting'); }

// ===== SENTENCE SELECTION =====
// Tap a word, get the whole sentence selected. Native browser selection is
// the source of truth; we're just offering a faster affordance than the
// usual long-press-and-drag on touch, and a single-click shortcut on desktop.
// Drag still works normally (selects an arbitrary range) because we only
// intercept "clean" taps with minimal movement.
(() => {
  // Guard: Intl.Segmenter available on all modern browsers but fall back to
  // naive regex if not.
  const hasSegmenter = typeof Intl !== 'undefined' && typeof Intl.Segmenter === 'function';
  const sentenceSegmenter = hasSegmenter
    ? new Intl.Segmenter(undefined, { granularity: 'sentence' })
    : null;

  // Tap tolerances: how much a pointer can move between down and up before
  // we treat it as a drag rather than a tap.
  const TAP_MAX_MOVEMENT = 6;     // px
  const TAP_MAX_DURATION = 350;   // ms

  let downX = 0, downY = 0, downTime = 0, downed = false;

  function onPointerDown(e) {
    // Only primary button / primary touch
    if (e.button !== undefined && e.button !== 0) return;
    downX = e.clientX;
    downY = e.clientY;
    downTime = Date.now();
    downed = true;
  }

  function onPointerUp(e) {
    if (!downed) return;
    downed = false;
    const dx = Math.abs(e.clientX - downX);
    const dy = Math.abs(e.clientY - downY);
    const dt = Date.now() - downTime;
    // Native drag selection → let it be. Long press on mobile → let native
    // selection handle it. We only act on clean quick taps.
    if (dx > TAP_MAX_MOVEMENT || dy > TAP_MAX_MOVEMENT) return;
    if (dt > TAP_MAX_DURATION) return;

    // Ignore taps that landed on non-text elements (links, images).
    const target = e.target;
    if (!target || target.nodeType !== 1) return;
    if (target.closest('a, img, code, pre, figure')) return;

    // Find the sentence containing the tap point.
    const range = sentenceRangeAtPoint(e.clientX, e.clientY);
    if (!range) return;

    // Programmatically set the browser selection. Browser renders its own
    // highlight + (on touch) its own drag handles.
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    // Eat the click so the book's onclick=toggleReaderUI() doesn't fire.
    e.preventDefault();
    e.stopPropagation();
  }

  // Also stop clicks from propagating to r-book's toggle handler when a
  // selection exists inside r-inner (catches cases where drag-select
  // finished without passing through our pointerdown/up).
  function onClickCapture(e) {
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed && isInsideInner(sel.anchorNode)) {
      e.stopPropagation();
    }
  }

  function isInsideInner(node) {
    const inner = $('r-inner');
    if (!inner || !node) return false;
    const n = node.nodeType === 1 ? node : node.parentElement;
    return !!(n && inner.contains(n));
  }

  // Locate the word (or character position) under a screen point, then expand
  // to the enclosing sentence. Returns a Range, or null if nothing useful.
  function sentenceRangeAtPoint(x, y) {
    // caretRangeFromPoint (blink, webkit) or caretPositionFromPoint (gecko).
    let pos = null;
    if (document.caretRangeFromPoint) {
      const r = document.caretRangeFromPoint(x, y);
      if (r) pos = { node: r.startContainer, offset: r.startOffset };
    } else if (document.caretPositionFromPoint) {
      const cp = document.caretPositionFromPoint(x, y);
      if (cp) pos = { node: cp.offsetNode, offset: cp.offset };
    }
    if (!pos || !pos.node || pos.node.nodeType !== 3) return null;

    const textNode = pos.node;
    const localOffset = pos.offset;
    const nodeText = textNode.data;
    if (!nodeText || !nodeText.trim()) return null;

    // Find the sentence boundaries within this text node first. For most
    // prose this is enough — the tapped sentence is fully in one text node.
    // Cross-node sentences (e.g. containing <em>) are a Phase 1.1 problem.
    const bounds = sentenceBoundsAt(nodeText, localOffset);
    if (!bounds) return null;

    const range = document.createRange();
    range.setStart(textNode, bounds.start);
    range.setEnd(textNode, bounds.end);
    return range;
  }

  // Given a string and a character offset, return {start, end} of the
  // sentence that contains that offset. Uses Intl.Segmenter if available.
  function sentenceBoundsAt(str, offset) {
    if (sentenceSegmenter) {
      const segments = [...sentenceSegmenter.segment(str)];
      for (const s of segments) {
        const segEnd = s.index + s.segment.length;
        if (offset >= s.index && offset <= segEnd) {
          const trimmed = s.segment.replace(/^\s+/, '');
          const startPad = s.segment.length - trimmed.length;
          return {
            start: s.index + startPad,
            end: s.index + s.segment.length
          };
        }
      }
      return null;
    }
    // Fallback: scan for sentence terminators manually. Not great across
    // abbreviations but workable.
    const terminators = /[.!?。！？]\s/g;
    let start = 0, end = str.length;
    let m;
    while ((m = terminators.exec(str)) !== null) {
      if (m.index < offset) start = m.index + 1;
      else { end = m.index + 1; break; }
    }
    return { start, end };
  }

  // Wire up — use pointer events (unified mouse/touch). Capture phase so we
  // can cancel the click bubbling to r-book.
  const inner = $('r-inner');
  if (inner) {
    inner.addEventListener('pointerdown', onPointerDown);
    inner.addEventListener('pointerup', onPointerUp);
    inner.addEventListener('click', onClickCapture, true);
  }
})();
</script>
