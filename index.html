<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tomen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C45D3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Thow Mono'; src: url('fonts/ThowMono0.3-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper: #FAF6F1;
  --linen: #F3EDE5;
  --card: #FFFFFF;
  --ink: #2C2420;
  --stone: #8A7E76;
  --fog: #B8AFA7;
  --ember: #C45D3E;
  --clay: #A94E33;
  --brand: #D4654A;
  --border: rgba(44, 36, 32, 0.06);
  --shadow-cover: 0 4px 16px rgba(44, 36, 32, 0.08);
  --shadow-float: 0 8px 32px rgba(44, 36, 32, 0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font-read: 'Thow', 'Georgia', serif;
  --font-ui: 'Thow', 'Georgia', serif;
  --font-mono: 'Thow Mono', 'Courier New', monospace;
  --reading-width: 680px;
  --font-size: 18px;
  --line-height: 1.8;
}

.dark {
  --paper: #1A1614; --linen: #121010; --card: #242020;
  --ink: #E8E0D8; --stone: #9A8E86; --fog: #6A5E56;
  --ember: #E07050; --clay: #F08060; --brand: #E07050;
  --border: rgba(232, 224, 216, 0.06);
  --shadow-cover: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-float: 0 8px 32px rgba(0,0,0,0.4);
}

.sepia {
  --paper: #F4ECD8; --linen: #EBE1C8; --card: #FAF4E4;
  --ink: #3E3228; --stone: #7A6E5E; --fog: #A89880;
  --ember: #B85A3A; --clay: #9A4C2E; --brand: #C4604A;
  --border: rgba(62, 50, 40, 0.06);
}

html, body {
  height: 100%; overflow: hidden;
  background: linear-gradient(180deg, var(--paper) 0%, var(--linen) 60%, color-mix(in srgb, var(--linen), black 15%) 100%);
  color: var(--ink);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* ===== SCREENS ===== */
.screen { height: 100%; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ===== LIBRARY ===== */
.lib-header {
  padding: 16px 24px; flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
}

.lib-brand {
  font-family: var(--font-read); font-size: 20px; font-weight: 400;
  letter-spacing: -0.3px; color: var(--ink); line-height: 1;
  white-space: nowrap; margin-right: auto;
}
.lib-brand .greeting-name {
  color: var(--brand); cursor: pointer;
  border-bottom: 1px dashed transparent;
}
.lib-brand .greeting-name:hover { border-bottom-color: var(--brand); }

.lib-toolbar { display: flex; align-items: center; gap: 6px; }

/* Import dropdown */
.import-wrap { position: relative; }
.import-menu {
  position: absolute; top: 100%; left: 0; margin-top: 4px;
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-float);
  padding: 4px; z-index: 100; display: none; min-width: 140px;
}
.import-menu.open { display: block; }
.import-option {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 12px; border: none; background: transparent;
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  cursor: pointer; border-radius: 4px; text-align: left;
}
.import-option:hover { background: var(--linen); }
.import-option svg { width: 16px; height: 16px; color: var(--stone); flex-shrink: 0; }

.lib-controls { display: flex; align-items: center; gap: 4px; }


.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: var(--radius-sm); border: none;
  font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  cursor: pointer;
}

.btn-primary {
  background: var(--brand); color: white;
}
.btn-primary:hover { background: var(--clay); }

.btn-ghost {
  background: transparent; color: var(--stone); border: 0.5px solid var(--border);
}
.btn-ghost:hover { background: var(--linen); color: var(--ink); }

.icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; color: var(--stone);
  border-radius: var(--radius-sm); cursor: pointer;
}
.icon-btn:hover { background: var(--linen); color: var(--ember); }
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn.active { color: var(--ember); }

/* View switcher */
.view-switch { display: flex; gap: 2px; background: var(--linen); border-radius: 6px; padding: 2px; }
.view-switch .icon-btn { width: 32px; height: 32px; border-radius: 4px; }
.view-switch .icon-btn.active { background: var(--card); }

/* Library body */
.lib-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 28px 28px; min-height: 0; }
.lib-body.spine-active {
  overflow: hidden;
  padding: 0;
  display: flex;
  min-height: 0;
}
.lib-body.spine-active > .view-spine-wrap { flex: 1; min-height: 0; overflow-x: auto; overflow-y: hidden; }
.lib-body::-webkit-scrollbar { width: 4px; }
.lib-body::-webkit-scrollbar-thumb { background: var(--fog); border-radius: 2px; opacity: 0.3; }

/* Empty */
.empty-lib {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px; text-align: center;
}
.empty-lib svg { width: 48px; height: 48px; color: var(--fog); margin-bottom: 16px; opacity: 0.4; }
.empty-lib h3 { font-family: var(--font-read); font-size: 20px; color: var(--stone); margin-bottom: 4px; font-weight: 400; }
.empty-lib p { font-size: 13px; color: var(--fog); max-width: 260px; line-height: 1.5; }

/* === TEXT VIEW === */
.view-text { display: flex; flex-direction: column; gap: 0; }
.tv-item { cursor: pointer; padding: 16px 0; border-bottom: 0.5px solid var(--border); }
.tv-item:last-child { border-bottom: none; }
.tv-item:hover .tv-title { color: var(--ember); }
.tv-title {
  font-family: var(--font-read); font-size: 28px; font-weight: 400;
  letter-spacing: -0.5px; line-height: 1.2; color: var(--ink);
}
.tv-title.reading { color: var(--ember); }
.tv-author { font-size: 12px; color: var(--fog); margin-top: 3px; }
.tv-progress {
  height: 2px; background: var(--linen); border-radius: 1px;
  width: 100px; margin-top: 6px; overflow: hidden;
}
.tv-progress-fill { height: 100%; background: var(--ember); border-radius: 1px; }

/* === GRID VIEW === */
.view-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 20px;
}
.gc { cursor: pointer; }
.gc:hover .gc-cover { transform: translateY(-2px); }
.gc-cover {
  width: 100%; aspect-ratio: 2 / 3; border-radius: var(--radius-sm);
  overflow: hidden; box-shadow: var(--shadow-cover); position: relative;
  background: var(--card);
}
.gc-cover img { width: 100%; height: 100%; object-fit: cover; }
.gc-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 14px; text-align: center;
}
.gc-placeholder .gcp-title {
  font-family: var(--font-read); font-size: 13px; font-weight: 500;
  color: white; line-height: 1.3; margin-bottom: 4px;
}
.gc-placeholder .gcp-author { font-size: 10px; color: rgba(255,255,255,0.7); }
.gc-prog {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(0,0,0,0.1);
}
.gc-prog-fill { height: 100%; background: var(--ember); }
.gc-title {
  font-size: 13px; font-weight: 600; color: var(--ink);
  margin-top: 10px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.gc-author { font-size: 11px; color: var(--stone); margin-top: 2px; }

/* === SPINE VIEW === */
.view-spine-wrap {
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  height: 100%;
  width: 100%;
}
.view-spine-wrap::-webkit-scrollbar { height: 6px; }
.view-spine-wrap::-webkit-scrollbar-track { background: transparent; }
.view-spine-wrap::-webkit-scrollbar-thumb { background: var(--fog); border-radius: 3px; opacity: 0.3; }
.view-spine {
  display: flex; align-items: flex-end; gap: 3px; height: 100%;
  width: max-content;
  padding: 40px 40px 28px 28px;
}
.spine {
  flex-shrink: 0;
  border-radius: 2px 5px 5px 2px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  box-shadow: inset -3px 0 6px rgba(0,0,0,0.2), 2px 0 6px rgba(0,0,0,0.12);
  will-change: transform;
}
.spine:hover { filter: brightness(1.08); }

/* Pinned / last-read book — first in shelf */
.spine.pinned {
  margin-right: 4px;
}

/* Use a single pseudo-element for top highlight + bottom shadow (lighting from above) */
.spine::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 8px),
    linear-gradient(0deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 30%, transparent 60%);
  pointer-events: none;
  border-radius: inherit;
}

/* Page edge — simpler gradient */
.spine-pages {
  position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 1px 0 0 1px;
}

.spine-band {
  position: absolute; left: 0; right: 0;
  height: 1px;
  background: rgba(0,0,0,0.12);
}

.spine-text {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-family: var(--font-read);
  color: white; line-height: 1.1;
  padding: 0 4px; overflow: hidden;
  max-height: calc(100% - 24px);
  max-width: calc(100% - 4px);
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  z-index: 1;
  word-break: break-word;
  hyphens: auto;
  text-wrap: balance;
  display: flex;
  align-items: center;
}
.spine-prog {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(0,0,0,0.15);
}
.spine-prog-fill { height: 100%; background: var(--ember); }

/* Debug: character count at bottom of spine */
.spine-chars {
  position: absolute;
  bottom: 6px; left: 0; right: 0;
  font-family: var(--font-mono);
  font-size: 7px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  z-index: 3;
  writing-mode: horizontal-tb;
  letter-spacing: 0;
}

/* Bookmark ribbon — flat 2D, brand color */
.spine-bookmark {
  position: absolute;
  top: -2px;
  left: 17.5%;
  width: 65%;
  height: 110px;
  background: var(--brand);
  z-index: 2;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 80%, 0 100%);
}
/* Fold crease near top */
.spine-bookmark::after {
  content: '';
  position: absolute;
  top: 8px; left: 0; right: 0;
  height: 1px;
  background: rgba(0,0,0,0.12);
  box-shadow: 0 1px 0 rgba(255,255,255,0.08);
}

/* Last-read separator */
.spine-spacer {
  flex-shrink: 0;
  width: 20px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.spine-spacer-line {
  width: 1px;
  height: 40%;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
}

/* ===== READER ===== */
.r-progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--ember); z-index: 50; width: 0;
}

.r-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; flex-shrink: 0;
  background: var(--paper); border-bottom: 0.5px solid var(--border); z-index: 10;
}
.r-toolbar.hidden { display: none; }

.r-toolbar-left, .r-toolbar-right { display: flex; align-items: center; gap: 4px; }

.r-title {
  font-family: var(--font-read); font-size: 14px; font-weight: 400;
  color: var(--stone); max-width: 180px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-left: 4px;
}

.r-content {
  flex: 1; overflow-y: auto; padding: 36px 24px;
}
.r-content::-webkit-scrollbar { width: 3px; }
.r-content::-webkit-scrollbar-thumb { background: var(--fog); border-radius: 2px; opacity: 0.2; }

.r-inner {
  max-width: var(--reading-width); margin: 0 auto;
  font-family: var(--font-read); font-size: var(--font-size);
  line-height: var(--line-height); color: var(--ink);
}
.r-inner h1, .r-inner h2, .r-inner h3 {
  font-family: var(--font-read); font-weight: 600; margin: 1.4em 0 0.5em; line-height: 1.3;
}
.r-inner h1 { font-size: 1.5em; }
.r-inner h2 { font-size: 1.25em; }
.r-inner h3 { font-size: 1.1em; }
.r-inner p { margin-bottom: 1em; text-align: justify; hyphens: auto; }
.r-inner img { max-width: 100%; border-radius: var(--radius-sm); margin: 1em 0; }
.r-inner blockquote {
  border-left: 2px solid var(--ember); padding-left: 1.2em;
  margin: 1.2em 0; color: var(--stone); font-style: italic;
}
.r-inner a { color: var(--ember); text-decoration: none; }

.r-bottom {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-top: 0.5px solid var(--border);
  background: var(--paper); flex-shrink: 0;
}
.r-bottom.hidden { display: none; }
.r-bottom-nav { display: flex; gap: 4px; }
.r-pct { font-size: 11px; color: var(--fog); font-family: var(--font-mono); }

/* ===== OVERLAYS ===== */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  z-index: 200; display: none;
}
.overlay.open { display: block; }

/* Settings */
.settings {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 28px 32px; z-index: 201;
  transform: translateY(100%); transition: transform 0.25s var(--ease);
  max-height: 70vh; overflow-y: auto;
}
.overlay.open .settings { transform: translateY(0); }
.settings-handle { width: 32px; height: 3px; background: var(--fog); border-radius: 2px; margin: 0 auto 20px; opacity: 0.35; }
.settings-section { margin-bottom: 22px; }
.settings-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--fog); margin-bottom: 10px;
}
.theme-row { display: flex; gap: 8px; }
.theme-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: transparent;
  font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--ink);
}
.theme-btn.active { border-color: var(--ember); color: var(--ember); }
.range-row { display: flex; align-items: center; gap: 12px; }
.range-row input[type="range"] {
  flex: 1; -webkit-appearance: none; height: 3px;
  border-radius: 2px; background: var(--linen); outline: none;
}
.range-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px;
  border-radius: 50%; background: var(--ember); cursor: pointer;
}
.range-label {
  font-size: 12px; font-family: var(--font-mono);
  color: var(--stone); min-width: 32px; text-align: center;
}

/* TOC */
.toc-panel {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(300px, 80vw); background: var(--card);
  z-index: 201; transform: translateX(-100%);
  transition: transform 0.25s var(--ease);
  display: flex; flex-direction: column;
}
.overlay.open .toc-panel { transform: translateX(0); }
.toc-header {
  padding: 20px 24px; border-bottom: 0.5px solid var(--border);
  font-family: var(--font-read); font-size: 18px; font-weight: 500;
}
.toc-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.toc-item {
  display: block; width: 100%; text-align: left;
  padding: 11px 24px; border: none; background: transparent;
  font-family: var(--font-ui); font-size: 13px; color: var(--stone); cursor: pointer;
}
.toc-item:hover { background: var(--linen); color: var(--ink); }
.toc-item.active { color: var(--ember); font-weight: 600; }

/* Loading */
.loading {
  position: fixed; inset: 0; background: var(--paper);
  display: none; flex-direction: column; align-items: center;
  justify-content: center; z-index: 500;
}
.loading.active { display: flex; }
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--linen);
  border-top-color: var(--ember); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--fog); }

/* Update toast */
.update-toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-float);
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  z-index: 600; font-size: 13px; color: var(--ink);
  transition: transform 0.25s var(--ease); white-space: nowrap;
}
.update-toast.visible { transform: translateX(-50%) translateY(0); }
.update-toast .u-btn {
  padding: 5px 12px; border-radius: 6px; border: none;
  background: var(--ember); color: white;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer;
}
.update-toast .u-dismiss {
  padding: 5px 8px; border: none; background: transparent;
  color: var(--fog); font-size: 12px; cursor: pointer;
}

#file-input { display: none; }

/* Responsive */
@media (max-width: 480px) {
  .lib-header { padding: 12px 12px; gap: 8px; }
  .lib-brand { font-size: 16px; }
  .lib-body { padding: 0 12px 12px; }
  .view-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 14px; }
  .tv-title { font-size: 22px; }
  .r-content { padding: 28px 16px; }
  .view-spine { padding: 12px 20px 16px 12px; gap: 2px; }
  .spine { --spine-scale: 0.45; }
  .view-spine-wrap::-webkit-scrollbar { height: 0; }
  .icon-btn { width: 32px; height: 32px; }
  .icon-btn svg { width: 18px; height: 18px; }
  .view-switch .icon-btn { width: 28px; height: 28px; }
  .sort-select { padding: 6px 24px 6px 8px; font-size: 11px; }
  .import-menu { left: auto; right: 0; }
}
@media (min-width: 481px) and (max-width: 768px) {
  .lib-header { padding: 14px 20px; }
  .spine { --spine-scale: 0.65; }
  .view-spine { padding: 0 32px 20px 20px; }
}
@media (min-width: 769px) {
  .view-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .spine { --spine-scale: 1; }
}

/* Sort select */
.sort-select {
  padding: 8px 12px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); background: transparent;
  font-family: var(--font-ui); font-size: 12px; color: var(--stone);
  cursor: pointer; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238A7E76' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
}
.sort-select:hover { background-color: var(--linen); color: var(--ink); }
</style>
</head>
<body>

<!-- ===== LIBRARY SCREEN ===== -->
<div class="screen active" id="screen-lib">
  <div class="lib-header">
    <span class="lib-brand" id="lib-greeting"></span>
    <div class="lib-toolbar">
      <div class="import-wrap">
        <button class="icon-btn" onclick="toggleImportMenu()" title="Import books">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 4v8M7 9l3 3 3-3"/><path d="M3 14v2a1 1 0 001 1h12a1 1 0 001-1v-2"/></svg>
        </button>
        <div class="import-menu" id="import-menu">
          <button class="import-option" onclick="document.getElementById('file-input').click(); closeImportMenu()">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H6a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V5z"/><path d="M13 2v3h3"/></svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ===== STATE =====
let library = []; // Metadata only: {id, title, author, cover, progress, chapterIndex, scrollPos}
let currentBook = null; // Full book with chapters when opened
let currentChapterIndex = 0;
let chapters = [];
let toc = [];
let uiVisible = true;
let currentView = localStorage.getItem('tomen_view') || 'spine';
let currentSort = localStorage.getItem('tomen_sort') || 'title';

// ===== INDEXEDDB STORAGE =====
const DB_NAME = 'tomen';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books')) {
        d.createObjectStore('books', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('content')) {
        d.createObjectStore('content', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ===== HELPERS =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function $(id) { return document.getElementById(id); }

// Save just the lightweight book metadata (not chapter content)
async function saveBookMeta(book) {
  const meta = {
    id: book.id, title: book.title, author: book.author, cover: book.cover,
    progress: book.progress || 0, chapterIndex: book.chapterIndex || 0,
    scrollPos: book.scrollPos || 0, chapterCount: (book.chapters || []).length,
    contentSize: (book.chapters || []).reduce((s, c) => s + (c.html?.length || 0), 0),
    spineColor: book.spineColor || null  // persist the extracted cover color
  };
  await dbPut('books', meta);
}

// Save the heavy book content (chapters + toc)
async function saveBookContent(book) {
  await dbPut('content', { id: book.id, chapters: book.chapters, toc: book.toc });
}

// Save progress for currently-open book (metadata only, no content rewrite)
async function saveLibrary() {
  // Find the book in library array and persist its metadata
  if (currentBook) {
    const idx = library.findIndex(b => b.id === currentBook.id);
    if (idx >= 0) {
      library[idx].progress = currentBook.progress;
      library[idx].chapterIndex = currentBook.chapterIndex;
      library[idx].scrollPos = currentBook.scrollPos;
      await saveBookMeta(library[idx]);
    }
  }
}

// Load full book content by ID (on demand when opening)
async function loadBookContent(id) {
  const content = await dbGet('content', id);
  return content || { chapters: [], toc: [] };
}

// Delete a book completely
async function deleteBook(id) {
  await dbDelete('books', id);
  await dbDelete('content', id);
  library = library.filter(b => b.id !== id);
}

// Migrate from old localStorage format
async function migrateFromLocalStorage() {
  const old = localStorage.getItem('tomen_library');
  if (!old) return;
  try {
    const oldLib = JSON.parse(old);
    if (!Array.isArray(oldLib) || oldLib.length === 0) {
      localStorage.removeItem('tomen_library');
      return;
    }
    console.log(`Migrating ${oldLib.length} books from localStorage to IndexedDB…`);
    for (const b of oldLib) {
      await saveBookMeta(b);
      if (b.chapters) await saveBookContent(b);
    }
    localStorage.removeItem('tomen_library');
    console.log('Migration complete.');
  } catch (err) {
    console.error('Migration failed:', err);
  }
}

async function loadLibrary() {
  library = await dbGetAll('books');
}

// Generate a color from a string (fallback for books without covers)
function strColor(str) {
  const colors = [
    ['#C45D3E','#A94E33'], ['#2C4A6E','#1A3350'], ['#3A7D5E','#2A5D44'],
    ['#8B6E5A','#6B5040'], ['#6B4C8A','#4A3466'], ['#B8860B','#8B6508'],
    ['#4A6B8A','#335070'], ['#8A4A5A','#6B3344'], ['#5A7A4A','#3D5A30'],
    ['#7A6B4A','#5A4E30']
  ];
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

// Extract dominant color from a cover image data URL
function extractColor(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 16;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < data.length; i += 4) {
        // Skip very light and very dark pixels
        const brightness = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        if (brightness > 30 && brightness < 220) {
          r += data[i]; g += data[i+1]; b += data[i+2]; count++;
        }
      }
      if (count === 0) { resolve(null); return; }
      r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
      // Make it slightly darker for the gradient bottom
      const dr = Math.max(0, r - 30), dg = Math.max(0, g - 30), db = Math.max(0, b - 30);
      resolve([`rgb(${r},${g},${b})`, `rgb(${dr},${dg},${db})`]);
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

// Cache extracted colors
const colorCache = {};
async function getSpineColor(book) {
  if (colorCache[book.id]) return colorCache[book.id];
  if (book.cover) {
    const extracted = await extractColor(book.cover);
    if (extracted) {
      colorCache[book.id] = extracted;
      return extracted;
    }
  }
  const fallback = strColor(book.title);
  colorCache[book.id] = fallback;
  return fallback;
}

// ===== SPINE DIMENSIONS =====
// Each book has a "volume" (from content size) and a "format" (seeded from title/author).
// Format determines how the volume is distributed between height and width.
// Tall/slim books are like paperbacks. Short/thick books are like hardcovers.

function hashBook(book) {
  let h = 0;
  const s = (book.title || '') + '|' + (book.author || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function spineDimensions(book) {
  const total = book.contentSize || (book.chapters || []).reduce((s, c) => s + (c.html?.length || 0), 0);
  const hash = hashBook(book);

  // Volume: log-scaled content size → 0.0 (tiny) to 1.0 (massive)
  const log = Math.log10(Math.max(1000, total));
  const volume = Math.max(0, Math.min(1, (log - 4.0) / 2.5)); // 4.0–6.5 → 0–1

  // Format: hash-seeded ratio of height vs width
  // 0.0 = very tall/slim, 1.0 = very short/thick
  const formatSeed = (hash % 100) / 100; // 0.0 to 0.99

  // Height: 65–98%, influenced by volume (bigger = taller) and format (tall format = taller)
  const tallness = 1.0 - formatSeed; // invert: low seed = tall
  const heightBase = 65 + volume * 20 + tallness * 13;
  const heightPct = Math.max(60, Math.min(98, Math.round(heightBase)));

  // Width: 40–120px, influenced by volume (bigger = wider) and format (thick format = wider)
  const thickness = formatSeed; // high seed = thick
  const widthBase = 40 + volume * 50 + thickness * 30;
  const widthPx = Math.max(40, Math.min(120, Math.round(widthBase)));

  // Apply responsive scale to width
  return { heightPct, widthPx: Math.round(widthPx * spineScale) };
}

// Keep these as wrappers for backward compatibility
function spineWidth(book) { return spineDimensions(book).widthPx; }
function spineHeight(book) { return spineDimensions(book).heightPct; }

// Get the current spine scale from CSS (responsive)
let spineScale = 1;
function updateSpineScale() {
  const test = document.createElement('div');
  test.className = 'spine';
  test.style.cssText = 'position:absolute;visibility:hidden;';
  document.body.appendChild(test);
  const val = getComputedStyle(test).getPropertyValue('--spine-scale');
  document.body.removeChild(test);
  spineScale = parseFloat(val) || 1;
}

// Shorten a title for spine display — truncate at first colon or dash subtitle
function spineTitle(title) {
  // Truncate at ": " or " — " or " - " (subtitle separators)
  const separators = [': ', ' — ', ' - '];
  for (const sep of separators) {
    const idx = title.indexOf(sep);
    if (idx > 0 && idx < title.length - 3) {
      return title.substring(0, idx);
    }
  }
  return title;
}

// Compute spine text style — binary search for largest size that fits
// Primary constraint: spine width. Text should not dominate the spine.
function spineTextStyle(width, title, spineHeightPx) {
  const displayTitle = spineTitle(title);
  const len = displayTitle.length;
  const maxH = Math.round(spineHeightPx * 0.70); // 70% of height
  const maxW = Math.round(width * 0.45); // 45% of width

  // Short titles get progressively wider allowance
  const effectiveMaxW = len <= 3 ? Math.round(width * 0.65) :
                        len <= 5 ? Math.round(width * 0.60) :
                        len <= 8 ? Math.round(width * 0.50) : maxW;

  function measure(text, fontSize, fontWeight) {
    const el = document.createElement('span');
    el.style.cssText = `
      position:absolute;top:-9999px;left:-9999px;visibility:hidden;
      writing-mode:vertical-rl;text-orientation:mixed;
      font-family:Thow,Georgia,serif;line-height:1.1;
      word-break:break-word;hyphens:auto;white-space:normal;
      font-size:${fontSize}px;font-weight:${fontWeight};
      max-height:${maxH}px;
    `;
    el.textContent = text;
    document.body.appendChild(el);
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    document.body.removeChild(el);
    return { w, h };
  }

  let lo = 8, hi = len <= 3 ? 44 : len <= 5 ? 40 : 32, best = 8;
  for (let i = 0; i < 12; i++) {
    const mid = Math.round((lo + hi) / 2);
    if (lo > hi) break;
    const fw = mid >= 22 ? 500 : 400;
    const m = measure(displayTitle, mid, fw);
    if (m.w <= effectiveMaxW && m.h <= maxH) {
      best = mid;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }

  let size = best;
  let weight = size >= 22 ? 500 : 400;
  let spacing = size >= 18 ? '-0.2px' : size >= 12 ? '0.2px' : '0.4px';

  return { style: `font-size:${size}px;font-weight:${weight};letter-spacing:${spacing}`, displayTitle };
}

// ===== LIBRARY RENDERING =====
function setView(v) {
  currentView = v;
  localStorage.setItem('tomen_view', v);
  document.querySelectorAll('#view-switch .icon-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  $('lib-body').classList.toggle('spine-active', v === 'spine');
  renderLibrary();
}

function setSort(s) {
  currentSort = s;
  localStorage.setItem('tomen_sort', s);
  renderLibrary();
}

function getLastReadId() {
  return localStorage.getItem('tomen_lastRead') || null;
}

function getSortedLibrary() {
  const sorted = [...library];
  switch (currentSort) {
    case 'title':
      sorted.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      break;
    case 'title-desc':
      sorted.sort((a, b) => (b.title || '').localeCompare(a.title || ''));
      break;
    case 'author':
      sorted.sort((a, b) => (a.author || '').localeCompare(b.author || ''));
      break;
    case 'recent':
      sorted.reverse();
      break;
    case 'progress':
      sorted.sort((a, b) => (b.progress || 0) - (a.progress || 0));
      break;
  }

  // Pull last-read book to front
  const lastId = getLastReadId();
  if (lastId) {
    const idx = sorted.findIndex(b => b.id === lastId);
    if (idx > 0) {
      const [book] = sorted.splice(idx, 1);
      sorted.unshift(book);
    }
  }

  return sorted;
}

function renderLibrary() {
  const body = $('lib-body');
  if (library.length === 0) {
    body.innerHTML = `<div class="empty-lib">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5v-15A2.5 2.5 0 016.5 2H20v20H6.5a2.5 2.5 0 010-5H20"/></svg>
      <h3>No books yet</h3>
      <p>Add an EPUB or text file to start reading</p>
    </div>`;
    return;
  }
  const sorted = getSortedLibrary();
  if (currentView === 'text') renderTextView(body, sorted);
  else if (currentView === 'grid') renderGridView(body, sorted);
  else renderSpineView(body, sorted);
}

function renderTextView(el, books) {
  el.innerHTML = '<div class="view-text">' + books.map(b => {
    const p = b.progress || 0;
    const isReading = p > 0 && p < 100;
    return `<div class="tv-item" onclick="openBookById('${b.id}')">
      <div class="tv-title${isReading ? ' reading' : ''}">${esc(b.title)}</div>
      <div class="tv-author">${esc(b.author || 'Unknown')}${isReading ? ' · <span style="font-family:var(--font-mono);font-size:11px">' + Math.round(p) + '%</span>' : ''}</div>
      ${isReading ? '<div class="tv-progress"><div class="tv-progress-fill" style="width:' + p + '%"></div></div>' : ''}
    </div>`;
  }).join('') + '</div>';
}

function renderGridView(el, books) {
  el.innerHTML = '<div class="view-grid">' + books.map(b => {
    const p = b.progress || 0;
    const c = strColor(b.title);
    const cover = b.cover
      ? `<img src="${b.cover}" alt="">`
      : `<div class="gc-placeholder" style="background:linear-gradient(145deg,${c[0]},${c[1]})">
           <div class="gcp-title">${esc(b.title)}</div>
           <div class="gcp-author">${esc(b.author || '')}</div>
         </div>`;
    return `<div class="gc" onclick="openBookById('${b.id}')">
      <div class="gc-cover">${cover}${p > 0 ? '<div class="gc-prog"><div class="gc-prog-fill" style="width:' + p + '%"></div></div>' : ''}</div>
      <div class="gc-title">${esc(b.title)}</div>
      <div class="gc-author">${esc(b.author || 'Unknown')}</div>
    </div>`;
  }).join('') + '</div>';
}

function renderSpineView(el, books) {
  updateSpineScale();
  const lastId = getLastReadId();

  // Measure the actual container height so text sizing is accurate
  const containerH = el.clientHeight || 600; // fallback
  const paddingTop = 40, paddingBottom = 28; // match CSS padding
  const usableH = containerH - paddingTop - paddingBottom;

  const spineData = books.map((b, i) => {
    const w = spineWidth(b);
    const hPct = spineHeight(b);
    const hPx = Math.round((hPct / 100) * usableH);
    let seed = 0;
    for (let j = 0; j < b.title.length; j++) seed += b.title.charCodeAt(j);
    const bandTop = 15 + (seed % 25);
    const bandBottom = 65 + ((seed * 7) % 20);
    const color = b.spineColor || strColor(b.title);
    const hasProgress = (b.progress || 0) > 0 && (b.progress || 0) < 100;
    const isLastRead = b.id === lastId;
    const contentSize = b.contentSize || 0;
    return { book: b, index: i, width: w, heightPct: hPct, heightPx: hPx,
      color, progress: b.progress || 0, bandTop, bandBottom, hasProgress, isLastRead, contentSize };
  });

  el.innerHTML = '<div class="view-spine-wrap"><div class="view-spine" id="spine-row">' +
    spineData.map((s, i) => {
      const { style: ts, displayTitle } = spineTextStyle(s.width, s.book.title, s.heightPx);
      const pinnedClass = s.isLastRead ? ' pinned' : '';
      const charLabel = s.contentSize > 1000000 ? (s.contentSize / 1000000).toFixed(1) + 'M' :
                        s.contentSize > 1000 ? Math.round(s.contentSize / 1000) + 'k' :
                        s.contentSize;
      const spineHtml = `<div class="spine${pinnedClass}" id="spine-${s.index}" style="width:${s.width}px;height:${s.heightPct}%;background:linear-gradient(180deg,${s.color[0]},${s.color[1]})" onclick="openBookById('${s.book.id}')" title="${esc(s.book.title)}">
        <div class="spine-pages"></div>
        <div class="spine-band" style="top:${s.bandTop}%"></div>
        <div class="spine-band" style="top:${s.bandBottom}%"></div>
        ${s.hasProgress ? '<div class="spine-bookmark"></div>' : ''}
        <span class="spine-text" style="${ts}">${esc(displayTitle)}</span>
        <span class="spine-chars">${charLabel}</span>
        ${s.progress > 0 ? '<div class="spine-prog"><div class="spine-prog-fill" style="width:' + s.progress + '%"></div></div>' : ''}
      </div>`;
      const spacer = (s.isLastRead && spineData.length > 1) ?
        '<div class="spine-spacer"><div class="spine-spacer-line"></div></div>' : '';
      return spineHtml + spacer;
    }).join('') + '</div></div>';

  backfillSpineColors();
}

// Backfill spineColor for any books that don't have it yet (one-time migration)
let backfillRunning = false;
async function backfillSpineColors() {
  if (backfillRunning) return;
  const missing = library.filter(b => !b.spineColor && b.cover);
  if (missing.length === 0) return;
  backfillRunning = true;

  // Process in parallel batches of 4 to avoid blocking
  const batchSize = 4;
  for (let i = 0; i < missing.length; i += batchSize) {
    const batch = missing.slice(i, i + batchSize);
    await Promise.all(batch.map(async (book) => {
      const color = await extractColor(book.cover);
      if (color) {
        book.spineColor = color;
        await saveBookMeta(book);
        // Update the spine in the DOM if we're still on spine view
        if (currentView === 'spine') {
          const idx = library.findIndex(b => b.id === book.id);
          const el = $('spine-' + idx);
          if (el) el.style.background = `linear-gradient(180deg,${color[0]},${color[1]})`;
        }
      }
    }));
    // Yield between batches so the UI stays responsive
    await new Promise(r => setTimeout(r, 0));
  }
  backfillRunning = false;
}

// ===== FILE HANDLING =====
const SUPPORTED_EXT = ['.epub', '.txt', '.html', '.htm'];
function isSupportedFile(name) { return SUPPORTED_EXT.some(ext => name.toLowerCase().endsWith(ext)); }

async function handleFolderPick() {
  if (window.showDirectoryPicker) {
    try {
      const dirHandle = await window.showDirectoryPicker();
      const files = [];
      await collectFilesFromDir(dirHandle, files);
      if (files.length === 0) { alert('No supported files found (.epub, .txt, .html, .htm)'); return; }
      await importFiles(files);
    } catch (err) { if (err.name !== 'AbortError') console.error(err); }
  } else {
    const input = document.createElement('input');
    input.type = 'file'; input.webkitdirectory = true; input.multiple = true;
    input.onchange = async (e) => {
      const all = Array.from(e.target.files).filter(f => isSupportedFile(f.name));
      if (all.length === 0) { alert('No supported files found (.epub, .txt, .html, .htm)'); return; }
      await importFiles(all);
    };
    input.click();
  }
}

async function collectFilesFromDir(dirHandle, files) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file' && isSupportedFile(entry.name)) files.push(await entry.getFile());
    else if (entry.kind === 'directory') await collectFilesFromDir(entry, files);
  }
}

async function importFiles(files) {
  const existingTitles = new Set(library.map(b => b.title.toLowerCase()));
  const newFiles = files.filter(f => !existingTitles.has(f.name.replace(/\.[^.]+$/, '').toLowerCase()));
  if (newFiles.length === 0) { alert('All books in this folder are already in your library.'); return; }
  showLoading(true, `Importing 0 / ${newFiles.length}…`);
  let n = 0, skipped = 0;

  for (const file of newFiles) {
    // Per-file timeout so one bad file can't hang the whole import
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('timeout after 30s')), 30000)
    );
    const importPromise = (async () => {
      if (file.name.toLowerCase().endsWith('.epub')) await loadEpub(file, true);
      else await loadTextFile(file, true);
    })();

    try {
      await Promise.race([importPromise, timeoutPromise]);
      n++;
    } catch (err) {
      console.warn(`Skipped ${file.name}:`, err);
      skipped++;
    }
    showLoading(true, `Importing ${n} / ${newFiles.length}…`);
    // Yield to the event loop briefly so UI can update
    await new Promise(r => setTimeout(r, 0));
  }

  renderLibrary();
  showLoading(false);
  if (skipped > 0) {
    setTimeout(() => alert(`Imported ${n} books. ${skipped} could not be read (likely DRM-protected or corrupt).`), 100);
  }
}

async function handleFiles(e) {
  for (const file of Array.from(e.target.files)) {
    if (file.name.endsWith('.epub')) await loadEpub(file);
    else await loadTextFile(file);
  }
  e.target.value = '';
}

async function loadTextFile(file, batch = false) {
  const text = await file.text();
  const title = file.name.replace(/\.[^.]+$/, '');
  const html = `<h1>${esc(title)}</h1>` + text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
  const book = {
    id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
    title, author: '', cover: null,
    chapters: [{ title, html }], toc: [{ title, index: 0 }],
    progress: 0, chapterIndex: 0, scrollPos: 0
  };
  await saveBookMeta(book);
  await saveBookContent(book);
  // Add lightweight meta to in-memory library (without chapters/toc)
  library.push({
    id: book.id, title: book.title, author: book.author, cover: book.cover,
    progress: 0, chapterIndex: 0, scrollPos: 0,
    chapterCount: 1, contentSize: html.length
  });
  if (!batch) renderLibrary();
}

async function loadEpub(file, batch = false) {
  if (!batch) showLoading(true);
  try {
    const zip = await JSZip.loadAsync(file);
    const containerFile = zip.file('META-INF/container.xml');
    if (!containerFile) throw new Error('Missing container.xml — not a valid EPUB');
    const containerXml = await containerFile.async('text');
    const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
    const rootfileEl = containerDoc.querySelector('rootfile');
    if (!rootfileEl) throw new Error('Missing rootfile reference');
    const rootfilePath = rootfileEl.getAttribute('full-path');
    const rootDir = rootfilePath.includes('/') ? rootfilePath.substring(0, rootfilePath.lastIndexOf('/') + 1) : '';
    const opfFile = zip.file(rootfilePath);
    if (!opfFile) throw new Error('Missing OPF file');
    const opfXml = await opfFile.async('text');
    const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

    const titleEl = opfDoc.querySelector('metadata title');
    const authorEl = opfDoc.querySelector('metadata creator');
    const title = titleEl ? titleEl.textContent : file.name.replace('.epub', '');
    const author = authorEl ? authorEl.textContent : '';

    let cover = null;
    const coverMeta = opfDoc.querySelector('meta[name="cover"]');
    if (coverMeta) {
      const coverItem = opfDoc.querySelector(`item[id="${coverMeta.getAttribute('content')}"]`);
      if (coverItem) {
        const cf = zip.file(rootDir + coverItem.getAttribute('href')) || zip.file(coverItem.getAttribute('href'));
        if (cf) cover = await blobToDataURL(await cf.async('blob'));
      }
    }
    if (!cover) {
      const ci = opfDoc.querySelector('item[properties="cover-image"]');
      if (ci) {
        const cf = zip.file(rootDir + ci.getAttribute('href')) || zip.file(ci.getAttribute('href'));
        if (cf) cover = await blobToDataURL(await cf.async('blob'));
      }
    }

    const spineItems = Array.from(opfDoc.querySelectorAll('spine itemref'));
    const manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => { manifest[item.getAttribute('id')] = item.getAttribute('href'); });

    const bookChapters = [];
    const imageCache = {};

    for (const si of spineItems) {
      const href = manifest[si.getAttribute('idref')];
      if (!href) continue;
      const chPath = rootDir + href;
      const chFile = zip.file(chPath) || zip.file(href);
      if (!chFile) continue;
      const chDoc = new DOMParser().parseFromString(await chFile.async('text'), 'application/xhtml+xml');
      const body = chDoc.body || chDoc.querySelector('body');
      if (!body) continue;

      for (const img of body.querySelectorAll('img, image')) {
        const src = img.getAttribute('src') || img.getAttribute('xlink:href');
        if (!src) continue;
        const chDir = chPath.includes('/') ? chPath.substring(0, chPath.lastIndexOf('/') + 1) : '';
        const imgPath = resolveHref(chDir, src);
        if (!imageCache[imgPath]) {
          const imgFile = zip.file(imgPath);
          if (imgFile) imageCache[imgPath] = await blobToDataURL(await imgFile.async('blob'));
        }
        if (imageCache[imgPath]) img.setAttribute('src', imageCache[imgPath]);
      }
      for (const si2 of body.querySelectorAll('svg image')) {
        const h2 = si2.getAttribute('xlink:href') || si2.getAttribute('href');
        if (h2 && imageCache[resolveHref(rootDir, h2)]) si2.setAttribute('xlink:href', imageCache[resolveHref(rootDir, h2)]);
      }

      const ct = body.querySelector('h1, h2, h3, title');
      bookChapters.push({ title: ct ? ct.textContent.trim() : `Chapter ${bookChapters.length + 1}`, html: body.innerHTML });
    }

    const bookToc = bookChapters.map((ch, i) => ({ title: ch.title, index: i }));
    const ncxItem = opfDoc.querySelector('item[media-type="application/x-dtbncx+xml"]');
    if (ncxItem) {
      const ncxFile = zip.file(rootDir + ncxItem.getAttribute('href')) || zip.file(ncxItem.getAttribute('href'));
      if (ncxFile) {
        const ncxDoc = new DOMParser().parseFromString(await ncxFile.async('text'), 'application/xml');
        const navPoints = ncxDoc.querySelectorAll('navMap > navPoint');
        if (navPoints.length > 0) {
          bookToc.length = 0;
          navPoints.forEach(np => {
            const label = np.querySelector('navLabel text');
            const content = np.querySelector('content');
            if (label && content) {
              const src = content.getAttribute('src').split('#')[0];
              const idx = bookChapters.findIndex((_, i) => {
                const h = manifest[spineItems[i]?.getAttribute('idref')];
                return h === src || h?.endsWith(src);
              });
              if (idx >= 0) bookToc.push({ title: label.textContent.trim(), index: idx });
            }
          });
        }
      }
    }

    const finalToc = bookToc.length > 0 ? bookToc : bookChapters.map((ch, i) => ({ title: ch.title, index: i }));
    const contentSize = bookChapters.reduce((s, c) => s + (c.html?.length || 0), 0);

    // Extract spine color from cover during import (once) so it persists
    let spineColor = null;
    if (cover) {
      spineColor = await extractColor(cover);
    }
    if (!spineColor) spineColor = strColor(title);

    const book = {
      id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
      title, author, cover, chapters: bookChapters, toc: finalToc,
      progress: 0, chapterIndex: 0, scrollPos: 0, spineColor
    };
    await saveBookMeta(book);
    await saveBookContent(book);
    library.push({
      id: book.id, title: book.title, author: book.author, cover: book.cover,
      progress: 0, chapterIndex: 0, scrollPos: 0,
      chapterCount: bookChapters.length, contentSize, spineColor
    });
    if (!batch) renderLibrary();
  } catch (err) {
    console.error('EPUB parse error:', err);
    if (!batch) alert('Could not open this EPUB. It may be DRM-protected or unsupported.');
    throw err;  // re-throw so importFiles can count it as skipped
  }
  if (!batch) showLoading(false);
}

function resolveHref(base, rel) {
  if (rel.startsWith('/') || rel.startsWith('http')) return rel;
  const parts = (base + rel).split('/');
  const out = [];
  for (const p of parts) { if (p === '..') out.pop(); else if (p !== '.') out.push(p); }
  return out.join('/');
}

function blobToDataURL(blob) {
  return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
}

// ===== READER =====
async function openBookById(id) {
  const meta = library.find(b => b.id === id);
  if (!meta) return;
  localStorage.setItem('tomen_lastRead', id);
  showLoading(true, 'Opening book…');
  try {
    const content = await loadBookContent(meta.id);
    currentBook = { ...meta, chapters: content.chapters, toc: content.toc };
    chapters = currentBook.chapters;
    toc = currentBook.toc;
    currentChapterIndex = currentBook.chapterIndex || 0;
    $('r-title').textContent = currentBook.title;
    $('screen-lib').classList.remove('active');
    $('screen-reader').classList.add('active');
    uiVisible = true;
    $('r-toolbar').classList.remove('hidden');
    $('r-bottom').classList.remove('hidden');
    renderChapter();
    buildTOC();
    setTimeout(() => { $('r-content').scrollTop = currentBook.scrollPos || 0; }, 30);
  } catch (err) {
    console.error('Failed to open book:', err);
    alert('Could not open this book.');
  } finally {
    showLoading(false);
  }
}

function showLibrary() {
  saveProgress();
  $('screen-reader').classList.remove('active');
  $('screen-lib').classList.add('active');
  renderLibrary();
}

function renderChapter() {
  $('r-inner').innerHTML = chapters[currentChapterIndex]?.html || '<p>No content</p>';
  $('r-content').scrollTop = 0;
  updateProgress();
}

function prevChapter() { if (currentChapterIndex > 0) { currentChapterIndex--; renderChapter(); saveProgress(); } }
function nextChapter() { if (currentChapterIndex < chapters.length - 1) { currentChapterIndex++; renderChapter(); saveProgress(); } }

function goToChapter(index) {
  currentChapterIndex = index;
  renderChapter(); saveProgress(); toggleTOC();
}

function updateProgress() {
  const el = $('r-content');
  const scrollPct = el.scrollHeight <= el.clientHeight ? 100 : (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
  const pct = chapters.length > 1 ? ((currentChapterIndex + scrollPct / 100) / chapters.length) * 100 : scrollPct;
  $('r-progress').style.width = pct + '%';
  $('r-pct').textContent = Math.round(pct) + '%';
}

function saveProgress() {
  if (!currentBook) return;
  const el = $('r-content');
  currentBook.chapterIndex = currentChapterIndex;
  currentBook.scrollPos = el.scrollTop;
  const scrollPct = el.scrollHeight <= el.clientHeight ? 100 : (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
  currentBook.progress = chapters.length > 1 ? ((currentChapterIndex + scrollPct / 100) / chapters.length) * 100 : scrollPct;
  const idx = library.findIndex(b => b.id === currentBook.id);
  if (idx >= 0) library[idx] = currentBook;
  saveLibrary();
}

$('r-content')?.addEventListener('scroll', () => {
  updateProgress();
  clearTimeout(window._saveTm);
  window._saveTm = setTimeout(saveProgress, 500);
});

// ===== TOC =====
function buildTOC() {
  $('toc-list').innerHTML = toc.map(item =>
    `<button class="toc-item${item.index === currentChapterIndex ? ' active' : ''}" onclick="goToChapter(${item.index})">${esc(item.title)}</button>`
  ).join('');
}
function toggleTOC() { $('ov-toc').classList.toggle('open'); }

// ===== UI TOGGLE =====
function toggleReaderUI() {
  uiVisible = !uiVisible;
  $('r-toolbar').classList.toggle('hidden', !uiVisible);
  $('r-bottom').classList.toggle('hidden', !uiVisible);
}

// ===== SETTINGS =====
function toggleSettings() { $('ov-settings').classList.toggle('open'); }

// ===== PROFILE =====
function toggleProfile() {
  const ov = $('ov-profile');
  ov.classList.toggle('open');
  if (ov.classList.contains('open')) {
    $('profile-name').value = localStorage.getItem('tomen_name') || '';
  }
}
function updateProfileName(name) {
  localStorage.setItem('tomen_name', name.trim());
  renderGreeting();
}

// ===== IMPORT MENU =====
function toggleImportMenu() {
  $('import-menu').classList.toggle('open');
}
function closeImportMenu() {
  $('import-menu').classList.remove('open');
}
// Close import menu when clicking outside
document.addEventListener('click', e => {
  const wrap = document.querySelector('.import-wrap');
  if (wrap && !wrap.contains(e.target)) closeImportMenu();
});

function setTheme(theme) {
  document.body.className = theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  localStorage.setItem('tomen_theme', theme);
}

function setFontSize(v) {
  document.documentElement.style.setProperty('--font-size', v + 'px');
  $('fs-display').textContent = v;
  localStorage.setItem('tomen_fontSize', v);
}
function setLineHeight(v) {
  const lh = (v / 10).toFixed(1);
  document.documentElement.style.setProperty('--line-height', lh);
  $('lh-display').textContent = lh;
  localStorage.setItem('tomen_lineHeight', v);
}
function showLoading(show, msg) {
  $('loading').classList.toggle('active', show);
  if (msg) $('loading-text').textContent = msg;
  else if (show) $('loading-text').textContent = 'Opening book…';
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (!$('screen-reader').classList.contains('active')) return;
  if (e.key === 'ArrowLeft') prevChapter();
  else if (e.key === 'ArrowRight') nextChapter();
  else if (e.key === 'Escape') showLibrary();
});

// ===== SPINE SCROLL — translate vertical wheel to horizontal =====
document.addEventListener('wheel', e => {
  const wrap = document.querySelector('.view-spine-wrap');
  if (!wrap || !wrap.contains(e.target)) return;
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    wrap.scrollLeft += e.deltaY;
  }
}, { passive: false });

// ===== GREETING =====
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function renderGreeting() {
  const name = localStorage.getItem('tomen_name') || '';
  const el = $('lib-greeting');
  if (name) {
    el.innerHTML = `${getGreeting()}, <span class="greeting-name" onclick="toggleProfile()" title="Profile">${esc(name)}</span>`;
  } else {
    el.innerHTML = getGreeting();
  }
}

// ===== INIT =====
(async function init() {
  const t = localStorage.getItem('tomen_theme') || '';
  setTheme(t);
  const fs = localStorage.getItem('tomen_fontSize');
  if (fs) { setFontSize(fs); $('sl-fontsize').value = fs; }
  const lh = localStorage.getItem('tomen_lineHeight');
  if (lh) { setLineHeight(lh); $('sl-lineheight').value = lh; }
  renderGreeting();

  // Open IndexedDB and load library
  try {
    await openDB();
    await migrateFromLocalStorage();
    await loadLibrary();
  } catch (err) {
    console.error('Storage init failed:', err);
  }

  // Restore sort
  $('sort-select').value = currentSort;

  setView(currentView);
})();
</script>

<!-- Service Worker -->
<script>
let waitingSW = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    if (reg.waiting) showUpdateToast(reg.waiting);
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateToast(nw);
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}
function showUpdateToast(sw) { waitingSW = sw; $('update-toast').classList.add('visible'); }
function applyUpdate() { if (waitingSW) waitingSW.postMessage('skipWaiting'); }
</script>
