<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tomen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C45D3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- Phosphor icons (regular weight only) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
<style>
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Thow'; src: url('fonts/Thow0.3-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Thow Mono'; src: url('fonts/ThowMono0.3-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Siche Text'; src: url('fonts/Siche-Text-v.0.3-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Siche Text'; src: url('fonts/Siche-Text-v.0.3-Regular-Italic.woff2') format('woff2'); font-weight: 400; font-style: italic; font-display: swap; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper: #FAF6F1;
  --linen: #F3EDE5;
  --card: #FFFFFF;
  --paper-edge: #E6DED2;
  --ink: #2C2420;
  --stone: #8A7E76;
  --fog: #B8AFA7;
  --ember: #C45D3E;
  --clay: #A94E33;
  --brand: #D4654A;
  --border: rgba(44, 36, 32, 0.06);
  --shadow-cover: 0 4px 16px rgba(44, 36, 32, 0.08);
  --shadow-float: 0 8px 32px rgba(44, 36, 32, 0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font-read: 'Thow', 'Georgia', serif;
  --font-ui: 'Thow', 'Georgia', serif;
  --font-mono: 'Thow Mono', 'Courier New', monospace;
  --reading-width: 1400px;
  --font-size: 18px;
  --line-height: 1.8;
}

.dark {
  --paper: #1A1614; --linen: #121010; --card: #242020;
  --paper-edge: #2C2623;
  --ink: #E8E0D8; --stone: #9A8E86; --fog: #6A5E56;
  --ember: #E07050; --clay: #F08060; --brand: #E07050;
  --border: rgba(232, 224, 216, 0.06);
  --shadow-cover: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-float: 0 8px 32px rgba(0,0,0,0.4);
}

.sepia {
  --paper: #F4ECD8; --linen: #EBE1C8; --card: #FAF4E4;
  --paper-edge: #DACEAE;
  --ink: #3E3228; --stone: #7A6E5E; --fog: #A89880;
  --ember: #B85A3A; --clay: #9A4C2E; --brand: #C4604A;
  --border: rgba(62, 50, 40, 0.06);
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

/* ===== SCREENS ===== */
.screen { height: 100%; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ===== LIBRARY ===== */
.lib-header {
  padding: 16px 24px; flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
}

.lib-brand {
  font-family: var(--font-read); font-size: 20px; font-weight: 400;
  letter-spacing: -0.3px; color: var(--ink); line-height: 1;
  white-space: nowrap; margin-right: auto;
}
.lib-brand .greeting-name {
  color: var(--brand); cursor: pointer;
  border-bottom: 1px dashed transparent;
}
.lib-brand .greeting-name:hover { border-bottom-color: var(--brand); }

.lib-toolbar { display: flex; align-items: center; gap: 6px; }

/* Import dropdown */
.import-wrap { position: relative; }
.import-menu {
  position: absolute; top: 100%; left: 0; margin-top: 4px;
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-float);
  padding: 4px; z-index: 100; display: none; min-width: 140px;
}
.import-menu.open { display: block; }
.import-option {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 12px; border: none; background: transparent;
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  cursor: pointer; border-radius: 4px; text-align: left;
}
.import-option:hover { background: var(--linen); }
.import-option svg { width: 16px; height: 16px; color: var(--stone); flex-shrink: 0; }
.import-option .ph { font-size: 16px; color: var(--stone); flex-shrink: 0; line-height: 1; }

.lib-controls { display: flex; align-items: center; gap: 4px; }


.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 16px; border-radius: var(--radius-sm); border: none;
  font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  cursor: pointer;
}

.btn-primary {
  background: var(--brand); color: white;
}
.btn-primary:hover { background: var(--clay); }

.btn-ghost {
  background: transparent; color: var(--stone); border: 0.5px solid var(--border);
}
.btn-ghost:hover { background: var(--linen); color: var(--ink); }

.icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; color: var(--stone);
  border-radius: var(--radius-sm); cursor: pointer;
}
.icon-btn:hover { background: var(--linen); color: var(--ember); }
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn .ph { font-size: 20px; line-height: 1; }
.icon-btn.active { color: var(--ember); }

/* View switcher */
.view-switch { display: flex; gap: 2px; background: var(--linen); border-radius: 6px; padding: 2px; }
.view-switch .icon-btn { width: 32px; height: 32px; border-radius: 4px; }
.view-switch .icon-btn.active { background: var(--card); }

/* Library body */
.lib-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 28px 28px; min-height: 0; }
.lib-body.spine-active {
  overflow: hidden;
  padding: 0;
  display: flex;
  min-height: 0;
}
.lib-body.spine-active > .view-spine-wrap {
  flex: 1;
  min-height: 0;
  min-width: 0;
  overflow-x: auto;
  overflow-y: hidden;
  display: flex;
  align-items: flex-end;  /* bottom-anchor the inner view-spine when it's shorter than the wrap */
}
.lib-body::-webkit-scrollbar { width: 4px; }
.lib-body::-webkit-scrollbar-thumb { background: var(--fog); border-radius: 2px; opacity: 0.3; }

/* Empty */
.empty-lib {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px; text-align: center;
}
.empty-lib svg { width: 48px; height: 48px; color: var(--fog); margin-bottom: 16px; opacity: 0.4; }
.empty-lib .ph { font-size: 48px; color: var(--fog); margin-bottom: 16px; opacity: 0.4; line-height: 1; }
.empty-lib h3 { font-family: var(--font-read); font-size: 20px; color: var(--stone); margin-bottom: 4px; font-weight: 400; }
.empty-lib p { font-size: 13px; color: var(--fog); max-width: 260px; line-height: 1.5; }

/* === TEXT VIEW === */
.view-text { display: flex; flex-direction: column; gap: 0; }
.tv-item { cursor: pointer; padding: 16px 0; border-bottom: 0.5px solid var(--border); }
.tv-item:last-child { border-bottom: none; }
.tv-item:hover .tv-title { color: var(--ember); }
.tv-title {
  font-family: var(--font-read); font-size: 28px; font-weight: 400;
  letter-spacing: -0.5px; line-height: 1.2; color: var(--ink);
}
.tv-title.reading { color: var(--ember); }
.tv-author { font-size: 12px; color: var(--fog); margin-top: 3px; }
.tv-progress {
  height: 2px; background: var(--linen); border-radius: 1px;
  width: 100px; margin-top: 6px; overflow: hidden;
}
.tv-progress-fill { height: 100%; background: var(--ember); border-radius: 1px; }

/* === GRID VIEW === */
.view-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 20px;
}
.gc { cursor: pointer; }
.gc:hover .gc-cover { transform: translateY(-2px); }
.gc-cover {
  width: 100%; aspect-ratio: 2 / 3; border-radius: var(--radius-sm);
  overflow: hidden; box-shadow: var(--shadow-cover); position: relative;
  background: var(--card);
}
.gc-cover img { width: 100%; height: 100%; object-fit: cover; }
.gc-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 14px; text-align: center;
}
.gc-placeholder .gcp-title {
  font-family: var(--font-read); font-size: 13px; font-weight: 500;
  color: white; line-height: 1.3; margin-bottom: 4px;
}
.gc-placeholder .gcp-author { font-size: 10px; color: rgba(255,255,255,0.7); }
.gc-prog {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(0,0,0,0.1);
}
.gc-prog-fill { height: 100%; background: var(--ember); }
.gc-title {
  font-size: 13px; font-weight: 600; color: var(--ink);
  margin-top: 10px; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.gc-author { font-size: 11px; color: var(--stone); margin-top: 2px; }

/* === SPINE VIEW ========================================================

Clean layout:
  0 ...... 8%   : top headband zone (thin line at ~8%)
  10% .. 74%   : title zone (upper), height 64%, primary + optional secondary
  74% .. 90%   : author zone (lower), height 16%, horizontal text
  92% ...100%  : bottom headband zone (thin line at ~92%)

All text placement uses the JS-measured dimensions of each zone, so CSS and JS
never disagree. Orientation is vertical for title/secondary, horizontal for author.
============================================================================ */

.view-spine-wrap {
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  height: 100%;
  width: 100%;
}
.view-spine-wrap::-webkit-scrollbar { height: 6px; }
.view-spine-wrap::-webkit-scrollbar-track { background: transparent; }
.view-spine-wrap::-webkit-scrollbar-thumb { background: var(--fog); border-radius: 3px; opacity: 0.3; }

.view-spine {
  display: flex; align-items: flex-end; gap: 3px;
  height: 100%;
  max-height: 85vh;
  width: max-content;
  min-width: 100%;
  padding: 40px 40px 28px 28px;
}

.spine {
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  border-radius: 3px 6px 6px 3px;
  box-shadow:
    inset  1px 0 0 rgba(255,255,255,0.06),
    inset -3px 0 6px rgba(0,0,0,0.22),
    2px 0 5px rgba(0,0,0,0.18);
  will-change: transform;
}
.spine:hover { filter: brightness(1.08); }
.spine.pinned { margin-right: 4px; }

/* Cloth weave texture — two very subtle crossed gradients */
.spine::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(90deg, transparent 0 1px, rgba(0,0,0,0.035) 1px 2px),
    repeating-linear-gradient(0deg, transparent 0 1px, rgba(255,255,255,0.025) 1px 2px);
  pointer-events: none;
  border-radius: inherit;
  z-index: 0;
}

/* Left edge page sliver — follows the rounded corners */
.spine-pages {
  position: absolute; left: 0; top: 0; bottom: 0; width: 1.5px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.16) 6%,
    rgba(255,255,255,0.16) 94%,
    rgba(255,255,255,0) 100%);
  border-radius: inherit;
  z-index: 1;
  pointer-events: none;
}

/* Headband ridges — positioned via inline `top` percent from JS */
.spine-band {
  position: absolute; left: 0; right: 0; height: 1px;
  background: rgba(0,0,0,0.12);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04);
  z-index: 1;
  pointer-events: none;
}

/* Title zone — upper area, holds primary + optional secondary side by side */
.spine-top {
  position: absolute;
  top: 12%; left: 0; right: 0; height: 68%;
  display: flex;
  flex-direction: row;
  gap: 4px;
  padding: 0 3px;
  z-index: 2;
  pointer-events: none;
  justify-content: center;
  align-items: flex-start;
}
.spine-top.center { align-items: center; }

/* Author zone — small strip near bottom, ending just before bottom band */
.spine-bot {
  position: absolute;
  top: 84%; left: 0; right: 0; height: 6%;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 1%;
  z-index: 2;
  pointer-events: none;
}

/* Vertical text for title + secondary */
.spine-title, .spine-secondary {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--font-read);
  line-height: 1.1;
  word-break: break-word;
  text-shadow: 0 1px 0 rgba(0,0,0,0.45);
}
.spine-title { color: rgba(248,240,228,0.9); }
.spine-secondary {
  color: rgba(248,240,228,0.6);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-height: 100%;
}

/* Horizontal text for author */
.spine-author {
  writing-mode: horizontal-tb;
  font-family: var(--font-read);
  line-height: 1.15;
  color: rgba(248,240,228,0.72);
  text-align: center;
  text-shadow: 0 1px 0 rgba(0,0,0,0.45);
  word-break: normal;
  overflow-wrap: break-word;
}

/* Bookmark — hangs from above the top band, out of the title zone */
.spine-bookmark {
  position: absolute;
  top: -2px;
  left: 30%;
  width: 40%;
  height: 52px;
  background: var(--brand);
  z-index: 3;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 82%, 0 100%);
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}

.spine-prog {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(0,0,0,0.15);
}
.spine-prog-fill { height: 100%; background: var(--ember); }

/* Last-read separator */
.spine-spacer {
  flex-shrink: 0;
  width: 20px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.spine-spacer-line {
  width: 1px;
  height: 40%;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
}

/* ===== READER ===== */
.r-progress {
  position: fixed; bottom: 0; left: 0; height: 3px;
  background: var(--ember); z-index: 50; width: 0;
}

.r-toolbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: color-mix(in srgb, var(--paper) 82%, transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 0.5px solid var(--border);
  z-index: 10;
  transition: opacity 180ms ease;
}
.r-toolbar.hidden { opacity: 0; pointer-events: none; }

.r-toolbar-left, .r-toolbar-right { display: flex; align-items: center; gap: 4px; }

.r-title {
  font-family: var(--font-read); font-size: 14px; font-weight: 400;
  color: var(--stone); max-width: 180px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-left: 4px;
}

/* Reader content — no scrolling, content paginates into a two-column spread.
   Each "spread" is 2 columns wide. Additional pages exist as further columns
   that we translate into view. Chapter boundaries rerender fresh. */
.r-content {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 72px 60px 68px;
  display: flex;
  align-items: stretch;
}

.r-book {
  flex: 1;
  position: relative;
  overflow: hidden;
  max-width: var(--reading-width, 1400px);
  margin: 0 auto;
  width: 100%;
}

.r-pages {
  column-count: 2;
  column-fill: auto;
  column-gap: 80px;
  height: 100%;
  width: 100%;
  transition: transform 220ms ease, opacity 160ms ease;
  will-change: transform, opacity;
  opacity: 1;
}
.r-pages.fade { opacity: 0; }

/* Click zones for pagination. Cursor hides when over the zone so the
   hover-ring stands in for it. */
.r-click-zone {
  position: absolute;
  top: 0; bottom: 0;
  width: 22%;
  cursor: none;
  z-index: 3;
  background: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
.r-click-zone.prev { left: 0; }
.r-click-zone.next { right: 0; }

/* Quick controls cluster — three drag pills grouped at bottom center, only
   visible when the reader UI (toolbar) is showing. Each pill is both a
   touch-start target and a visual preview of its control's range. Once a drag
   starts, the gesture is free to travel anywhere on screen. */
.r-quick {
  position: absolute;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%) translateY(8px);
  display: flex;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease, transform 200ms ease;
  z-index: 10;
}
body.r-ui-visible .r-quick {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

/* Shared pill shape */
.r-quick-pill {
  background: color-mix(in srgb, var(--paper) 82%, transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid var(--border);
  border-radius: 999px;
  color: var(--fog);
  font-family: var(--font-ui);
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: ns-resize;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  transition: background 140ms ease, color 140ms ease;
}
.r-quick-pill:hover { color: var(--ink); background: color-mix(in srgb, var(--paper) 95%, transparent); }

/* Vertical pill: font size, line height */
.r-quick-pill:not(.r-quick-pill-h) {
  flex-direction: column;
  padding: 10px 0;
  width: 40px;
}

/* Horizontal pill: width */
.r-quick-pill-h {
  flex-direction: row;
  padding: 0 14px;
  height: 40px;
  cursor: ew-resize;
}

/* Font-size glyph extremes */
.r-glyph-big   { font-size: 18px; font-weight: 500; }
.r-glyph-small { font-size: 10px; font-weight: 500; }

/* Line-height glyph extremes */
.r-glyph-lines-loose, .r-glyph-lines-tight {
  display: flex; flex-direction: column; align-items: center;
}
.r-glyph-lines-loose span, .r-glyph-lines-tight span {
  width: 14px; height: 1px; background: currentColor;
}
.r-glyph-lines-loose { gap: 5px; }
.r-glyph-lines-tight { gap: 1.5px; }

/* Width glyph extremes */
.r-glyph-bar-short { width: 10px; height: 2px; background: currentColor; border-radius: 1px; }
.r-glyph-bar-long  { width: 32px; height: 2px; background: currentColor; border-radius: 1px; }

/* Hold-to-turn circular indicator. Positioned via inline left/top at cursor.
   Two visible states: 'hover' (empty ring shown at 55% opacity when cursor is
   over a click zone) and 'active' (full opacity while pressed, ring fills). */
.r-hold-ring {
  position: absolute;
  width: 66px; height: 66px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 140ms ease;
  z-index: 5;
  transform: translate(-50%, -50%);
}
.r-hold-ring.hover { opacity: 0.75; }
.r-hold-ring.active { opacity: 1; }
.r-hold-ring svg {
  width: 100%; height: 100%;
  overflow: visible;
}
.r-hold-track {
  display: none;
}
.r-hold-fill {
  fill: none;
  stroke: var(--ember);
  stroke-width: 1.2;
  stroke-linecap: round;
  stroke-dasharray: 106.8;  /* 2 * PI * r (r=17) */
  stroke-dashoffset: 106.8;
  transform: rotate(-90deg);
  transform-origin: center;
  /* Transition set inline when the hold starts */
}
.r-hold-arrow {
  stroke: var(--ember);
  stroke-width: 1.2;
  display: none;
}
.r-hold-ring.dir-prev .r-hold-arrow-prev { display: block; }
.r-hold-ring.dir-next .r-hold-arrow-next { display: block; }

/* Swipe-to-turn edge glow. Tall ember bloom on whichever side the user is
   swiping toward. Opacity scales with swipe progress. */
.r-swipe-ring {
  position: absolute;
  top: 0; bottom: 0;
  width: 240px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 80ms linear;
  z-index: 5;
}
.r-swipe-ring.dir-prev {
  left: 0;
  background: radial-gradient(
    ellipse 65% 45% at left center,
    rgba(212, 101, 74, 0.92) 0%,
    rgba(212, 101, 74, 0.6)  16%,
    rgba(212, 101, 74, 0.28) 38%,
    rgba(212, 101, 74, 0.08) 65%,
    rgba(212, 101, 74, 0)    95%
  );
}
.r-swipe-ring.dir-next {
  right: 0;
  background: radial-gradient(
    ellipse 65% 45% at right center,
    rgba(212, 101, 74, 0.92) 0%,
    rgba(212, 101, 74, 0.6)  16%,
    rgba(212, 101, 74, 0.28) 38%,
    rgba(212, 101, 74, 0.08) 65%,
    rgba(212, 101, 74, 0)    95%
  );
}

/* Debug mode — reveals click/touch interaction zones.
   Toggle with Shift+D while the reader is active. */
body.r-debug .r-click-zone.prev {
  background: rgba(63, 138, 255, 0.18) !important;
  outline: 2px dashed rgba(63, 138, 255, 0.55) !important;
}
body.r-debug .r-click-zone.next {
  background: rgba(255, 138, 63, 0.18) !important;
  outline: 2px dashed rgba(255, 138, 63, 0.55) !important;
}
body.r-debug .r-quick-pill {
  outline: 2px dashed rgba(200, 80, 200, 0.55) !important;
}
body.r-debug .r-book {
  outline: 1px dashed rgba(100, 100, 100, 0.3) !important;
}

.r-inner {
  font-family: 'Siche Text', var(--font-read);
  font-size: var(--font-size);
  line-height: var(--line-height);
  color: var(--ink);
}
.r-inner h1, .r-inner h2, .r-inner h3 {
  font-family: var(--font-read); font-weight: 600;
  line-height: 1.3;
  break-after: avoid-column;
}
.r-inner h1 { font-size: 1.5em; margin: 0 0 0.6em; }
.r-inner h2 { font-size: 1.25em; margin: 1.4em 0 0.5em; }
.r-inner h3 { font-size: 1.1em; margin: 1.2em 0 0.4em; }
.r-inner p {
  margin: 0 0 1em;
  text-align: justify;
  hyphens: auto;
  break-inside: avoid-column;
}
.r-inner img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin: 1em 0;
  break-inside: avoid-column;
}
.r-inner blockquote {
  border-left: 2px solid var(--ember);
  padding-left: 1.2em;
  margin: 1.2em 0;
  color: var(--stone);
  font-style: italic;
  break-inside: avoid-column;
}
.r-inner a { color: var(--ember); text-decoration: none; }

.r-pct {
  font-size: 11px;
  color: var(--fog);
  font-family: var(--font-mono);
  margin: 0 4px;
  align-self: center;
}

/* ===== OVERLAYS ===== */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  z-index: 200; display: none;
}
.overlay.open { display: block; }

/* Settings */
.settings {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 28px 32px; z-index: 201;
  transform: translateY(100%); transition: transform 0.25s var(--ease);
  max-height: 70vh; overflow-y: auto;
}
.overlay.open .settings { transform: translateY(0); }
.settings-handle { width: 32px; height: 3px; background: var(--fog); border-radius: 2px; margin: 0 auto 20px; opacity: 0.35; }
.settings-section { margin-bottom: 22px; }
.settings-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--fog); margin-bottom: 10px;
}
.theme-row { display: flex; gap: 8px; }
.theme-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: transparent;
  font-family: var(--font-ui); font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--ink);
}
.theme-btn.active { border-color: var(--ember); color: var(--ember); }
.range-row { display: flex; align-items: center; gap: 12px; }
.range-row input[type="range"] {
  flex: 1; -webkit-appearance: none; height: 3px;
  border-radius: 2px; background: var(--linen); outline: none;
}
.range-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px;
  border-radius: 50%; background: var(--ember); cursor: pointer;
}
.range-label {
  font-size: 12px; font-family: var(--font-mono);
  color: var(--stone); min-width: 32px; text-align: center;
}

/* TOC */
.toc-panel {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: min(300px, 80vw); background: var(--card);
  z-index: 201; transform: translateX(-100%);
  transition: transform 0.25s var(--ease);
  display: flex; flex-direction: column;
}
.overlay.open .toc-panel { transform: translateX(0); }
.toc-header {
  padding: 20px 24px; border-bottom: 0.5px solid var(--border);
  font-family: var(--font-read); font-size: 18px; font-weight: 500;
}
.toc-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.toc-item {
  display: block; width: 100%; text-align: left;
  padding: 11px 24px; border: none; background: transparent;
  font-family: var(--font-ui); font-size: 13px; color: var(--stone); cursor: pointer;
}
.toc-item:hover { background: var(--linen); color: var(--ink); }
.toc-item.active { color: var(--ember); font-weight: 600; }

/* Loading */
.loading {
  position: fixed; inset: 0; background: var(--paper);
  display: none; flex-direction: column; align-items: center;
  justify-content: center; z-index: 500;
}
.loading.active { display: flex; }
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--linen);
  border-top-color: var(--ember); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--fog); }

/* Gesture feedback — brief indicator during swipe-based settings changes */
.gesture-toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  padding: 10px 18px;
  background: rgba(30, 26, 22, 0.85);
  color: var(--paper);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.3px;
  z-index: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 120ms ease;
  backdrop-filter: blur(6px);
}
.gesture-toast.show { opacity: 1; }

/* Update toast */
.update-toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-float);
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  z-index: 600; font-size: 13px; color: var(--ink);
  transition: transform 0.25s var(--ease); white-space: nowrap;
}
.update-toast.visible { transform: translateX(-50%) translateY(0); }
.update-toast .u-btn {
  padding: 5px 12px; border-radius: 6px; border: none;
  background: var(--ember); color: white;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer;
}
.update-toast .u-dismiss {
  padding: 5px 8px; border: none; background: transparent;
  color: var(--fog); font-size: 12px; cursor: pointer;
}

#file-input { display: none; }

/* Responsive */
@media (max-width: 480px) {
  .lib-header { padding: 12px 12px; gap: 8px; }
  .lib-brand { font-size: 16px; }
  .lib-body { padding: 0 12px 12px; }
  .view-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 14px; }
  .tv-title { font-size: 22px; }
  .r-content { padding: 28px 16px; }
  .view-spine { padding: 12px 20px 16px 12px; gap: 2px; }
  .spine { --spine-scale: 0.45; }
  .view-spine-wrap::-webkit-scrollbar { height: 0; }
  .icon-btn { width: 32px; height: 32px; }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn .ph { font-size: 18px; }
  .view-switch .icon-btn { width: 28px; height: 28px; }
  .sort-select { padding: 6px 24px 6px 8px; font-size: 11px; }
  .import-menu { left: auto; right: 0; }
}
@media (min-width: 481px) and (max-width: 768px) {
  .lib-header { padding: 14px 20px; }
  .spine { --spine-scale: 0.65; }
  .view-spine { padding: 0 32px 20px 20px; }
}
@media (min-width: 769px) {
  .view-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  .spine { --spine-scale: 1; }
}
